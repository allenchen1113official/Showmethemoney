<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Show Me The Money - 台股看盤系統，即時股價、景氣燈號、財經新聞">
  <title>💰 Show Me The Money - 台股看盤</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #656d76;
      --blue: #388bfd;
      --up: #f85149;    /* 台灣慣例：上漲=紅 */
      --down: #3fb950;  /* 台灣慣例：下跌=綠 */
      --warn: #d29922;
      --card-radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 0.65rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 0.75rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-shrink: 0;
    }
    .logo-icon { font-size: 1.75rem; }
    .logo h1 {
      font-size: 1.15rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .logo .sub { font-size: 0.68rem; color: var(--text2); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .badge {
      font-size: 0.72rem;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-open { background: rgba(63,185,80,.15); color: var(--up); border: 1px solid rgba(63,185,80,.4); }
    .badge-closed { background: rgba(139,148,158,.1); color: var(--text2); border: 1px solid rgba(139,148,158,.3); }

    .clock { text-align: right; }
    .clock-time {
      font-size: 1.15rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--blue);
    }
    .clock-date { font-size: 0.65rem; color: var(--text2); }

    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 0.3rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-icon:hover { border-color: var(--blue); color: var(--blue); }
    .btn-icon.spinning i { animation: spin 1s linear infinite; }

    /* ===== QUOTE BANNER ===== */
    #quoteBanner {
      background: linear-gradient(90deg, rgba(26,31,46,0.98) 0%, rgba(22,27,34,0.95) 100%);
      border-bottom: 1px solid rgba(255,215,0,0.18);
      padding: 0.55rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      min-height: 42px;
    }
    .quote-icon {
      font-size: 1.2rem;
      color: #ffd700;
      flex-shrink: 0;
      opacity: 0.85;
    }
    .quote-body {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .quote-text {
      font-size: 0.82rem;
      color: #e6d8a8;
      font-style: italic;
      letter-spacing: 0.02em;
      line-height: 1.4;
    }
    .quote-text::before { content: '「'; color: #ffd700; font-style: normal; font-weight: 700; }
    .quote-text::after  { content: '」'; color: #ffd700; font-style: normal; font-weight: 700; }
    .quote-author {
      font-size: 0.75rem;
      color: #ffd700;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0.9;
    }
    .quote-author::before { content: '— '; }
    .quote-cat {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 999px;
      background: rgba(255,215,0,0.1);
      color: rgba(255,215,0,0.65);
      border: 1px solid rgba(255,215,0,0.2);
      white-space: nowrap;
    }
    .quote-refresh {
      background: none;
      border: none;
      color: rgba(255,215,0,0.45);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.15rem 0.3rem;
      border-radius: 4px;
      transition: color .2s;
      flex-shrink: 0;
    }
    .quote-refresh:hover { color: #ffd700; }

    /* ===== MAIN GRID ===== */
    .main {
      max-width: 1900px;
      margin: 0 auto;
      padding: 0.9rem;
      display: grid;
      grid-template-columns: 270px 1fr 330px;
      gap: 0.9rem;
      align-items: start;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      margin-bottom: 0.9rem;
    }
    .card:last-child { margin-bottom: 0; }

    .card-hd {
      padding: 0.6rem 0.9rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,.02);
    }
    .card-title {
      font-size: 0.82rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .card-title i { color: var(--blue); }
    .card-bd { padding: 0.75rem 0.9rem; }

    .ts { font-size: 0.65rem; color: var(--text3); }

    /* ===== TRAFFIC LIGHT ===== */
    .tl-wrap {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.3rem 0;
    }
    .tl-bulb {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.08);
    }
    .tl-label { font-size: 1rem; font-weight: 700; }
    .tl-sub { font-size: 0.75rem; color: var(--text2); margin-top: 0.15rem; }
    .tl-date { font-size: 0.65rem; color: var(--text3); margin-top: 0.1rem; }
    .tl-link {
      display: block;
      text-align: center;
      font-size: 0.68rem;
      color: var(--blue);
      text-decoration: none;
      margin-top: 0.4rem;
      padding-top: 0.4rem;
      border-top: 1px solid var(--border);
    }
    .tl-link:hover { text-decoration: underline; }

    /* ===== MARKET ITEMS ===== */
    .mkt-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .mkt-item:last-child { border-bottom: none; }
    .mkt-left { display: flex; align-items: center; gap: 0.55rem; }
    .mkt-flag { font-size: 1.2rem; }
    .mkt-name { font-size: 0.88rem; font-weight: 600; }
    .mkt-sub { font-size: 0.7rem; color: var(--text2); }
    .mkt-right { text-align: right; }
    .mkt-price { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .mkt-chg { font-size: 0.75rem; font-variant-numeric: tabular-nums; }

    .up { color: var(--up); }
    .down { color: var(--down); }
    .neu { color: var(--text2); }

    /* ===== PORTFOLIO GRID ===== */
    .port-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
      padding: 0.75rem 0.9rem;
    }
    .stock-card {
      background: rgba(255,255,255,.025);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 7px;
      padding: 0.65rem 0.7rem;
      cursor: pointer;
      transition: all .2s;
      min-width: 0;
    }
    .stock-card:hover { border-color: var(--blue); background: rgba(56,139,253,.05); }
    .stock-card.up-card { border-left-color: var(--up); }
    .stock-card.down-card { border-left-color: var(--down); }
    .s-code { font-size: 0.82rem; font-weight: 700; color: var(--blue); }
    .s-name { font-size: 0.78rem; color: var(--text2); margin-top: 0.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .s-price { font-size: 1.15rem; font-weight: 700; margin-top: 0.35rem; font-variant-numeric: tabular-nums; }
    .s-chg { font-size: 0.78rem; font-variant-numeric: tabular-nums; }
    .s-vol { font-size: 0.7rem; color: var(--text3); margin-top: 0.15rem; }

    /* ===== INSTITUTIONAL ===== */
    .inst-hd {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text2);
      margin: 0.6rem 0 0.35rem;
      padding-top: 0.55rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .inst-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.22rem 0;
      font-size: 0.72rem;
      border-bottom: 1px solid rgba(255,255,255,.03);
    }
    .inst-row:last-child { border-bottom: none; }
    .inst-label { color: var(--text2); }
    .inst-val { font-variant-numeric: tabular-nums; font-weight: 600; }
    .inst-total { color: var(--warn); font-weight: 700; }
    .mkt-vol-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.22rem 0;
      font-size: 0.72rem;
      border-bottom: 1px solid rgba(255,255,255,.03);
    }
    .night-badge {
      font-size: 0.6rem;
      background: rgba(255,215,0,.15);
      color: #ffd700;
      border: 1px solid rgba(255,215,0,.3);
      border-radius: 3px;
      padding: 0.05rem 0.3rem;
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    /* ===== NEWS ITEMS ===== */
    .news-item {
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .news-item:last-child { border-bottom: none; }
    .news-item a { text-decoration: none; color: inherit; }
    .news-title {
      font-size: 0.78rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .2s;
    }
    .news-item:hover .news-title { color: var(--blue); }
    .news-meta { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.25rem; flex-wrap: wrap; }
    .news-rank { font-size: 0.7rem; font-weight: 700; color: var(--text3); width: 1.3rem; flex-shrink: 0; }
    .news-rank.gold { color: #ffd700; }
    .news-rank.silver { color: #c0c0c0; }
    .news-rank.bronze { color: #cd7f32; }
    .tag { font-size: 0.62rem; padding: 0.1rem 0.3rem; border-radius: 3px; }
    .tag-src { background: rgba(255,255,255,.06); color: var(--text3); }
    .tag-ticker { background: rgba(56,139,253,.12); color: var(--blue); font-weight: 600; }
    .tag-reddit { background: rgba(255,99,20,.12); color: #ff6314; }
    .ntime { font-size: 0.62rem; color: var(--text3); }

    /* ===== PTT ITEMS ===== */
    .ptt-item {
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .ptt-item:last-child { border-bottom: none; }
    .ptt-item a { text-decoration: none; color: inherit; }
    .ptt-title { font-size: 0.78rem; line-height: 1.4; transition: color .2s; }
    .ptt-item:hover .ptt-title { color: var(--blue); }
    .ptt-meta { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.2rem; }
    .ptt-push { font-size: 0.68rem; font-weight: 600; }
    .ptt-author { font-size: 0.62rem; color: var(--text3); }

    /* ===== REDDIT ITEMS ===== */
    .reddit-item {
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .reddit-item:last-child { border-bottom: none; }
    .reddit-item a { text-decoration: none; color: inherit; }
    .reddit-title {
      font-size: 0.78rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .2s;
    }
    .reddit-item:hover .reddit-title { color: var(--blue); }
    .reddit-meta { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.2rem; flex-wrap: wrap; }
    .r-ups { font-size: 0.65rem; color: #ff6314; }
    .r-cmt { font-size: 0.62rem; color: var(--text3); }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.015);
    }
    .tab {
      padding: 0.5rem 0.8rem;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--text2);
      border-bottom: 2px solid transparent;
      transition: all .2s;
      white-space: nowrap;
    }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab:hover { color: var(--text); }

    .tab-pane { display: none; padding: 0.75rem 0.9rem; }
    .tab-pane.active { display: block; }

    /* ===== PORTFOLIO NEWS ===== */
    .pn-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .pn-item:last-child { border-bottom: none; }
    .pn-item a { text-decoration: none; color: inherit; }
    .pn-title {
      font-size: 0.76rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .2s;
    }
    .pn-item:hover .pn-title { color: var(--blue); }
    .pn-meta { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.2rem; }

    /* ===== MODAL ===== */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .overlay.show { display: flex; }

    .modal {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem;
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-hd {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 1.1rem;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-hint { font-size: 0.72rem; color: var(--text2); margin-bottom: 0.9rem; }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
      margin-bottom: 1rem;
    }
    .input-item { display: flex; flex-direction: column; gap: 0.2rem; }
    .input-item label { font-size: 0.7rem; color: var(--text2); }
    .input-item input {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.38rem 0.55rem;
      color: var(--text);
      font-size: 0.82rem;
      font-family: inherit;
      transition: border-color .2s;
    }
    .input-item input:focus { outline: none; border-color: var(--blue); }

    .modal-foot { display: flex; gap: 0.65rem; justify-content: flex-end; }
    .btn-prim {
      background: var(--blue);
      border: none;
      color: #fff;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      transition: opacity .2s;
    }
    .btn-prim:hover { opacity: .85; }
    .btn-sec {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 0.45rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      transition: all .2s;
    }
    .btn-sec:hover { border-color: var(--text); color: var(--text); }

    /* ===== STATES ===== */
    .loading {
      text-align: center;
      color: var(--text3);
      padding: 1rem;
      font-size: 0.78rem;
    }
    .loading i { animation: spin 1s linear infinite; }
    .err { text-align: center; color: var(--down); padding: 0.75rem; font-size: 0.75rem; }
    .err a { color: var(--blue); }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ===== FINANCIAL CALENDAR ===== */
    .fin-day { margin-bottom: .75rem; }
    .fin-day:last-child { margin-bottom: 0; }
    .fin-day-lbl {
      font-size: .7rem; font-weight: 700; color: var(--blue);
      border-bottom: 1px solid var(--border); padding-bottom: .2rem; margin-bottom: .3rem;
      display: flex; align-items: center; gap: .4rem;
    }
    .fin-day-today .fin-day-lbl { color: #ffd700; }
    .fin-event {
      display: flex; align-items: flex-start; gap: .5rem;
      padding: .28rem 0; border-bottom: 1px solid rgba(255,255,255,.03);
      font-size: .75rem; line-height: 1.4;
    }
    .fin-event:last-child { border-bottom: none; }
    .ev-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; margin-top: .35rem;
    }
    .ev-fed   { background: #f0a500; }
    .ev-cbc   { background: var(--blue); }
    .ev-data  { background: #a371f7; }
    .ev-earn  { background: #e040fb; }
    .ev-mkt   { background: #3fb950; }
    .ev-name  { color: var(--text); }
    .ev-note  { font-size: .65rem; color: var(--text3); margin-top: .05rem; }
    .ev-imp-high .ev-name { font-weight: 600; }
    .fin-empty { font-size: .75rem; color: var(--text3); text-align: center; padding: .5rem 0; }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 0.9rem;
      font-size: 0.65rem;
      color: var(--text3);
      border-top: 1px solid var(--border);
      margin-top: 0.5rem;
    }
    .footer a { color: var(--blue); text-decoration: none; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1300px) {
      .main { grid-template-columns: 250px 1fr 300px; }
    }
    @media (max-width: 1050px) {
      .main { grid-template-columns: 1fr 1fr; }
      .right-col { grid-column: 1 / -1; }
    }
    @media (max-width: 720px) {
      .main { grid-template-columns: 1fr; padding: 0.6rem; gap: 0; }
      .right-col { grid-column: auto; }
      .card { margin-bottom: 0.6rem; }
      header { flex-wrap: wrap; }
      .header-right { gap: 0.6rem; }
      .clock-time { font-size: 1rem; }
      .port-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 420px) {
      .port-grid { grid-template-columns: 1fr; }
      .input-grid { grid-template-columns: 1fr; }
      .logo h1 { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header>
  <div class="logo">
    <span class="logo-icon">💰</span>
    <div>
      <h1>Show Me The Money</h1>
      <div class="sub">台股看盤系統</div>
    </div>
  </div>
  <div class="header-right">
    <span id="mktBadge" class="badge badge-closed">
      <i class="fa-solid fa-circle" style="font-size:.45em;margin-right:.3rem"></i>休市中
    </span>
    <div class="clock">
      <div class="clock-time" id="clkTime">--:--:--</div>
      <div class="clock-date" id="clkDate">----/--/--</div>
    </div>
    <button class="btn-icon" id="refreshBtn">
      <i class="fa-solid fa-rotate-right"></i> 更新
    </button>
  </div>
</header>

<!-- ===== QUOTE BANNER ===== -->
<div id="quoteBanner">
  <span class="quote-icon">📖</span>
  <div class="quote-body">
    <span class="quote-text" id="quoteText">載入中…</span>
    <span class="quote-author" id="quoteAuthor"></span>
    <span class="quote-cat" id="quoteCat"></span>
  </div>
  <button class="quote-refresh" onclick="fetchQuote()" title="換一句"><i class="fa-solid fa-shuffle"></i></button>
</div>

<script>
'use strict';

// ==================== CONFIG ====================
const CFG = {
  proxyA: 'https://corsproxy.io/?url=',        // primary
  proxyB: 'https://api.allorigins.win/raw?url=',// fallback
  yfChart:'https://query2.finance.yahoo.com/v8/finance/chart/',
  yfSrc:  'https://query1.finance.yahoo.com/v1/finance/search?q=',
  defaultPort: ['2330','2317','2454','2382','2412','6505','1301','2882','2308','3008'],
  refreshMs: 60000,
};

const TL_MAP = {
  red:       { label:'紅燈',   desc:'景氣過熱', color:'#ff4444', bg:'rgba(255,68,68,.18)',  icon:'🔴' },
  yellowRed: { label:'黃紅燈', desc:'景氣偏熱', color:'#ff8c00', bg:'rgba(255,140,0,.18)', icon:'🟠' },
  green:     { label:'綠燈',   desc:'景氣穩定', color:'#44bb44', bg:'rgba(68,187,68,.18)', icon:'🟢' },
  yellowBlue:{ label:'黃藍燈', desc:'景氣偏冷', color:'#40e0d0', bg:'rgba(64,224,208,.18)',icon:'🔵' },
  blue:      { label:'藍燈',   desc:'景氣衰退', color:'#4488ff', bg:'rgba(68,136,255,.18)',icon:'💙' },
};

let portfolio = [];
let refreshTimer = null;

// ==================== QUOTE API ====================
let _quotesCache = null;

async function fetchQuote() {
  try {
    if (!_quotesCache) {
      const res = await fetch('./quotes.json?t=' + Date.now());
      const data = await res.json();
      _quotesCache = data.quotes || [];
    }
    if (!_quotesCache.length) return;
    const q = _quotesCache[Math.floor(Math.random() * _quotesCache.length)];
    const el = id('quoteText'), ae = id('quoteAuthor'), ce = id('quoteCat');
    if (el) el.textContent = q.text;
    if (ae) ae.textContent = q.author;
    if (ce) ce.textContent = q.category || '';
  } catch(e) {
    const el = id('quoteText');
    if (el) el.textContent = '在別人貪婪時恐懼，在別人恐懼時貪婪。';
    const ae = id('quoteAuthor');
    if (ae) ae.textContent = '華倫·巴菲特';
  }
}

// ==================== INIT ====================
function init() {
  loadPortfolio();
  startClock();
  bindModalEvents();
  fetchQuote();
  setInterval(fetchQuote, 10 * 60 * 1000); // rotate every 10 min
  refreshAll();
  refreshTimer = setInterval(refreshAll, CFG.refreshMs);
}

function loadPortfolio() {
  const s = localStorage.getItem('smtm_port');
  portfolio = s ? JSON.parse(s) : [...CFG.defaultPort];
  while (portfolio.length < 10) portfolio.push('');
  portfolio = portfolio.slice(0, 10);
}

// ==================== CLOCK ====================
function startClock() {
  const tick = () => {
    const n = new Date();
    const el = id('clkTime');
    const de = id('clkDate');
    const be = id('mktBadge');
    if (el) el.textContent = n.toLocaleTimeString('zh-TW', { hour12: false });
    if (de) de.textContent = n.toLocaleDateString('zh-TW', {
      year:'numeric', month:'2-digit', day:'2-digit', weekday:'short'
    });
    const day = n.getDay(), h = n.getHours(), m = n.getMinutes();
    const open = day >= 1 && day <= 5 && (h > 9 || (h === 9 && m >= 0)) && (h < 13 || (h === 13 && m <= 30));
    if (be) {
      be.className = `badge ${open ? 'badge-open' : 'badge-closed'}`;
      be.innerHTML = `<i class="fa-solid fa-circle" style="font-size:.45em;margin-right:.3rem"></i>${open ? '交易中' : '休市中'}`;
    }
  };
  tick();
  setInterval(tick, 1000);
}

// ==================== FETCH HELPERS ====================
async function proxyFetch(url) {
  // Try proxy A first, then proxy B
  for (const px of [CFG.proxyA, CFG.proxyB]) {
    try {
      const r = await fetch(px + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
      if (r.ok) return r;
    } catch (_) {}
  }
  throw new Error('All proxies failed for: ' + url);
}

// 單支股票：使用 v8 chart API（range=5d 以取得前一日成交量作比較）
async function yfQuote(symbol) {
  const url = CFG.yfChart + encodeURIComponent(symbol) + '?interval=1d&range=5d';
  try {
    const r = await proxyFetch(url);
    const d = JSON.parse(await r.text());
    const result = d.chart?.result?.[0];
    const meta   = result?.meta;
    if (!meta || !meta.regularMarketPrice) return null;
    const price = meta.regularMarketPrice;
    const prev  = meta.chartPreviousClose || meta.regularMarketPreviousClose || price;
    const chg   = price - prev;
    const pct   = prev ? (chg / prev) * 100 : 0;

    // 從 indicators 取各日成交量，計算量增減百分比
    const vols      = (result?.indicators?.quote?.[0]?.volume || []).filter(v => v != null && v > 0);
    const todayVol  = meta.regularMarketVolume || (vols[vols.length - 1] || 0);
    const prevVol   = vols.length >= 2 ? vols[vols.length - 2] : 0;
    const volChgPct = prevVol > 0 ? ((todayVol - prevVol) / prevVol) * 100 : null;

    return {
      symbol,
      regularMarketPrice: price,
      regularMarketChange: chg,
      regularMarketChangePercent: pct,
      regularMarketVolume: todayVol,
      prevVolume: prevVol,
      volChgPct,
      regularMarketTime: meta.regularMarketTime || 0,
      shortName: meta.shortName || meta.longName || symbol,
    };
  } catch (e) {
    console.warn('[YF]', symbol, e.message);
    return null;
  }
}

// 批次（並行）
async function yfQuotes(symbols) {
  const valid = symbols.filter(Boolean);
  if (!valid.length) return [];
  const results = await Promise.allSettled(valid.map(s => yfQuote(s)));
  return results.filter(r => r.status === 'fulfilled' && r.value).map(r => r.value);
}

// 指數 / 期貨專用：使用 meta 內建的 change/percent（最準確），不自行計算
async function yfQuoteIndex(symbol) {
  const url = CFG.yfChart + encodeURIComponent(symbol) + '?interval=1d&range=2d';
  try {
    const r = await proxyFetch(url);
    const d = JSON.parse(await r.text());
    const result = d.chart?.result?.[0];
    const meta   = result?.meta;
    if (!meta || !meta.regularMarketPrice) return null;
    const price = meta.regularMarketPrice;
    // 優先使用 Yahoo 內建計算值，避免跨日 prev 不準
    const chg   = meta.regularMarketChange       ?? (price - (meta.chartPreviousClose || meta.regularMarketPreviousClose || price));
    const pct   = meta.regularMarketChangePercent ?? (meta.chartPreviousClose ? chg / meta.chartPreviousClose * 100 : 0);
    return {
      symbol,
      regularMarketPrice: price,
      regularMarketChange: chg,
      regularMarketChangePercent: pct,
      regularMarketVolume: meta.regularMarketVolume || 0,
      volChgPct: null,
      regularMarketTime: meta.regularMarketTime || 0,
      shortName: meta.shortName || meta.longName || symbol,
    };
  } catch (e) {
    console.warn('[YF-IDX]', symbol, e.message);
    return null;
  }
}

// 輔助：解析台指期各來源欄位
function parseFutPrice(item) {
  const n = s => parseFloat(String(s || '0').replace(/,/g,'')) || 0;
  const price = n(item.ClosingPrice) || n(item.LastPrice) || n(item.Close) || n(item.TradePrice) || n(item.LS);
  const ref   = n(item.ReferencePrice) || n(item.PreviousClosingPrice) || n(item.RefPrice) || n(item.REF) || n(item.PreviousClose);
  const chg   = n(item.Change) || n(item.PriceChange) || n(item.CHG) || (price && ref ? price - ref : 0);
  const pct   = ref > 0 ? chg / ref * 100 : 0;
  const vol   = n(item.Volume) || n(item.TradingVolume) || n(item.TV) || n(item.TotalVolume);
  return price > 0 ? { price, ref, chg, pct, vol } : null;
}

// 台指期：TAIFEX OpenAPI → MIS API（日盤+夜盤）→ Yahoo 備援
async function fetchTaifex() {
  const mkResult = (parsed, label) => ({
    symbol: 'FITX=F',
    regularMarketPrice: parsed.price,
    regularMarketChange: parsed.chg,
    regularMarketChangePercent: parsed.pct,
    regularMarketVolume: parsed.vol,
    volChgPct: null,
    regularMarketTime: Math.floor(Date.now() / 1000),
    shortName: label,
  });

  // ① TAIFEX OpenData REST API（最穩定，含日/夜盤）
  const openApis = [
    { url: 'https://openapi.taifex.com.tw/v1/DailyFuturesQuotes?CommodityID=TXF', label: '台指期' },
    { url: 'https://openapi.taifex.com.tw/v1/NightFuturesQuotes?CommodityID=TXF',  label: '台指期（夜盤）' },
  ];
  for (const api of openApis) {
    try {
      const r = await proxyFetch(api.url);
      const rows = JSON.parse(await r.text());
      if (!Array.isArray(rows) || !rows.length) continue;
      const parsed = parseFutPrice(rows[rows.length - 1]);
      if (parsed) return mkResult(parsed, api.label);
    } catch (_) {}
  }

  // ② TAIFEX MIS API（日盤 MarketCode=0，夜盤 MarketCode=1）
  for (const [mc, label] of [['0','台指期'],['1','台指期（夜盤）']]) {
    try {
      const url = `https://mis.taifex.com.tw/futures/api/getQuoteList?MarketCode=${mc}&CommodityID=TXF&ContractCode=&ContractMonth=&RowCount=5&PageNo=1&lang=zh-tw`;
      const r   = await proxyFetch(url);
      const d   = JSON.parse(await r.text());
      const list = (d.RtnData || d.Data || []);
      const item = list.find(i => (i.CommodityId||i.CommodityID||'').includes('TXF')) || list[0];
      if (!item) continue;
      const parsed = parseFutPrice(item);
      if (parsed) return mkResult(parsed, label);
    } catch (_) {}
  }

  // ③ Yahoo Finance 備援
  for (const sym of ['TXF1=F', 'FITX=F', 'TWF=F']) {
    const q = await yfQuoteIndex(sym);
    if (q && q.regularMarketPrice) { q.symbol = 'FITX=F'; return q; }
  }
  return null;
}

// ==================== TRAFFIC LIGHT ====================
async function fetchTL() {
  const el = id('tlContent');
  try {
    // Try NDC API (best-effort)
    const r = await fetch('https://index.ndc.gov.tw/n/json/leading/zh-TW',
      { signal: AbortSignal.timeout(6000) });
    if (r.ok) {
      const d = await r.json();
      const arr = d.data || d;
      if (Array.isArray(arr) && arr.length) {
        const last = arr[arr.length - 1];
        const score = last.score ?? last.综合判断分数 ?? last.總分;
        const month = last.yearMonth || last.date || '';
        if (score) { renderTL(el, score, month); return; }
      }
    }
  } catch (_) {}

  // Try via proxy
  try {
    const r2 = await proxyFetch('https://index.ndc.gov.tw/n/json/leading/zh-TW');
    const t = await r2.text();
    const d = JSON.parse(t);
    const arr = d.data || d;
    if (Array.isArray(arr) && arr.length) {
      const last = arr[arr.length - 1];
      const score = last.score ?? last.综合判断分数 ?? last.總分;
      const month = last.yearMonth || last.date || '';
      if (score) { renderTL(el, score, month); return; }
    }
  } catch (_) {}

  // Static fallback
  el.innerHTML = tlHTML('green', null, '請至NDC查看最新資料');
}

function renderTL(el, score, month) {
  let type = 'green';
  if (score >= 38) type = 'red';
  else if (score >= 32) type = 'yellowRed';
  else if (score >= 23) type = 'green';
  else if (score >= 17) type = 'yellowBlue';
  else type = 'blue';
  el.innerHTML = tlHTML(type, score, month);
}

function tlHTML(type, score, month) {
  const t = TL_MAP[type];
  return `
    <div class="tl-wrap">
      <div class="tl-bulb" style="background:${t.bg};box-shadow:0 0 18px ${t.bg}">${t.icon}</div>
      <div>
        <div class="tl-label" style="color:${t.color}">${t.label}</div>
        <div class="tl-sub">${t.desc}${score ? ` (${score}分)` : ''}</div>
        <div class="tl-date">${month || '參考值'}</div>
      </div>
    </div>
    <a href="https://index.ndc.gov.tw/" target="_blank" class="tl-link">
      查看最新景氣燈號 <i class="fa-solid fa-arrow-up-right-from-square"></i>
    </a>`;
}

// ==================== 櫃買指數（TPEx Composite Index）====================
async function fetchTpexIndex() {
  const mkQ = (price, chg, pct) => ({
    symbol: '^TPEX', regularMarketPrice: price,
    regularMarketChange: chg, regularMarketChangePercent: pct,
    regularMarketVolume: 0, volChgPct: null,
    regularMarketTime: Math.floor(Date.now() / 1000), shortName: '櫃買指數',
  });

  // ① TWSE MIS API（與加權指數同端點，otc_OTC01.tw）
  try {
    const url = 'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=otc_OTC01.tw&json=1&delay=0';
    const r = await proxyFetch(url);
    const d = JSON.parse(await r.text());
    const m = (d.msgArray || [])[0];
    if (m) {
      // z=成交價, y=昨收, b=最佳買價(fallback)
      const price = parseFloat(m.z || m.pz || 0);
      const prev  = parseFloat(m.y  || 0);
      if (price > 0 && prev > 0) return mkQ(price, price - prev, (price - prev) / prev * 100);
      if (price > 0) return mkQ(price, 0, 0);
    }
  } catch (_) {}

  // ② TPEx OpenAPI 統計月報（含前日指數）
  try {
    const r = await proxyFetch('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_summary');
    const rows = JSON.parse(await r.text());
    if (Array.isArray(rows) && rows.length) {
      const last = rows[rows.length - 1];
      const n = s => parseFloat(String(s||'').replace(/,/g,'')) || 0;
      const price = n(last.ClosingIndex) || n(last.Index) || n(last['指數']);
      const prev  = n(last.PreviousIndex) || n(last['前日指數']);
      if (price > 0) return mkQ(price, price - prev, prev > 0 ? (price - prev)/prev*100 : 0);
    }
  } catch (_) {}

  // ③ Yahoo Finance ^TPEX（有時有效）
  const q = await yfQuoteIndex('^TPEX');
  if (q && q.regularMarketPrice) return q;

  // ④ TPEx 即時報價頁面 JSON
  try {
    const r = await proxyFetch('https://www.tpex.org.tw/web/stock/aftertrading/otc_quotes_no1430/stk_wn1430_result.php?l=zh-tw&o=json&d=&se=EW&s=0,asc,0&_=1');
    const d = JSON.parse(await r.text());
    const n = s => parseFloat(String(s||'').replace(/,/g,'')) || 0;
    if (d && d.tpex_weighted_index) {
      const price = n(d.tpex_weighted_index);
      const prev  = n(d.yesterday_weighted_index);
      if (price > 0) return mkQ(price, price - prev, prev > 0 ? (price - prev)/prev*100 : 0);
    }
  } catch (_) {}

  return null;
}

// ==================== 台指近月（TXF）====================
async function fetchTxfNear() {
  const mkQ = (p) => ({
    symbol: 'TXF', regularMarketPrice: p.price,
    regularMarketChange: p.chg, regularMarketChangePercent: p.pct,
    regularMarketVolume: p.vol, volChgPct: null,
    regularMarketTime: Math.floor(Date.now() / 1000), shortName: '台指近月',
  });

  // ① TWSE MIS（tse_TXFR1.tw = 台指期近月連續）
  try {
    const url = 'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_TXFR1.tw&json=1&delay=0';
    const r = await proxyFetch(url);
    const d = JSON.parse(await r.text());
    const m = (d.msgArray || [])[0];
    if (m) {
      const price = parseFloat(m.z || m.pz || 0);
      const prev  = parseFloat(m.y || 0);
      if (price > 0) {
        const chg = prev > 0 ? price - prev : 0;
        const pct = prev > 0 ? chg / prev * 100 : 0;
        return mkQ({ price, chg, pct, vol: parseFloat(m.v || 0) });
      }
    }
  } catch (_) {}

  // ② TAIFEX OpenData（日盤收盤資料）
  try {
    const r = await proxyFetch('https://openapi.taifex.com.tw/v1/DailyFuturesQuotes?CommodityID=TXF');
    const rows = JSON.parse(await r.text());
    if (Array.isArray(rows) && rows.length) {
      // 取最後一筆（當日 or 最近交易日）
      for (let i = rows.length - 1; i >= 0; i--) {
        const parsed = parseFutPrice(rows[i]);
        if (parsed && parsed.price > 0) return mkQ(parsed);
      }
    }
  } catch (_) {}

  // ③ TAIFEX MIS（日盤即時）
  try {
    for (const mc of ['0', '1']) {
      const r = await proxyFetch(`https://mis.taifex.com.tw/futures/api/getQuoteList?MarketCode=${mc}&CommodityID=TXF&RowCount=5&PageNo=1&lang=zh-tw`);
      const d = JSON.parse(await r.text());
      const list = d.RtnData || d.Data || [];
      const item = list.find(i => (i.CommodityId||i.CommodityID||'').startsWith('TXF')) || list[0];
      if (item) {
        const parsed = parseFutPrice(item);
        if (parsed && parsed.price > 0) return mkQ(parsed);
      }
    }
  } catch (_) {}

  // ④ Yahoo Finance 備援
  for (const sym of ['TXF1=F', 'FITX=F', 'TWF=F']) {
    try {
      const q = await yfQuoteIndex(sym);
      if (q && q.regularMarketPrice) { q.symbol = 'TXF'; q.shortName = '台指近月'; return q; }
    } catch (_) {}
  }
  return null;
}

// ==================== 三大法人買賣超 ====================
// BFI82U 欄位格式（實測）：[[類別, 買進金額, 賣出金額, 買賣差額], ...]
// 單位：元（不是千元）。 元÷1e8 = 億
// 實際類別名稱：自營商(自行買賣)、自營商(避險)、自營商、投信、
//               外資及陸資(不含外資自營商)、外資自營商、外資及陸資、三大法人
async function fetchInstitutional() {
  const el = id('instContent');
  if (!el) return;

  // 欄位名稱 → 顯示標籤（精確匹配 + 模糊匹配）
  function instLabel(cat) {
    if (cat === '三大法人') return { label: '三大合計', isTotal: true };
    if (cat === '投信')     return { label: '投信', isTotal: false };
    // 自營商（只取合計列，排除子項）
    if (cat === '自營商')   return { label: '自營商', isTotal: false };
    // 外資：可能是 "外資及陸資" 或 "外資及陸資(不含外資自營商)"，都顯示為「外資」
    if (cat === '外資及陸資' || cat.startsWith('外資及陸資(')) return { label: '外資', isTotal: false };
    return null;
  }

  try {
    const url = 'https://www.twse.com.tw/rwd/zh/fund/BFI82U?type=day&response=json';
    const r   = await proxyFetch(url);
    const d   = JSON.parse(await r.text());
    const rows = d.data || [];
    if (!rows.length) throw new Error('BFI82U empty');

    const n = s => parseFloat(String(s||'0').replace(/,/g,'')) || 0;
    const date = d.date ? `${d.date.slice(0,4)}/${d.date.slice(4,6)}/${d.date.slice(6,8)}` : '';

    let html = `<div class="inst-hd"><i class="fa-solid fa-building-columns" style="color:var(--warn)"></i> 三大法人買賣超（億元）${date ? `<span style="font-weight:400;color:var(--text3);margin-left:.5rem">${date}</span>` : ''}</div>`;
    let found = 0;

    // 先收集「外資及陸資(不含外資自營商)」與「外資及陸資」，只顯示一個
    let foreignRow = null;
    const rendered = new Set();

    rows.forEach(row => {
      const cat = (row[0] || '').trim();
      const meta = instLabel(cat);
      if (!meta) return;

      // 外資：優先用 "外資及陸資"（合計），備用 "(不含外資自營商)"
      if (meta.label === '外資') {
        if (cat === '外資及陸資') {
          foreignRow = { net: n(row[3]), isTotal: false };
        } else if (!foreignRow) {
          foreignRow = { net: n(row[3]), isTotal: false };
        }
        return;
      }

      if (rendered.has(meta.label)) return;
      rendered.add(meta.label);
      found++;

      const net  = n(row[3]);
      const netB = (net / 1e8).toFixed(2);  // 元 ÷ 1e8 = 億
      const dir  = net > 0 ? 'up' : net < 0 ? 'down' : 'neu';
      const arr  = net > 0 ? '▲' : net < 0 ? '▼' : '─';
      html += `<div class="inst-row">
        <span class="inst-label ${meta.isTotal ? 'inst-total' : ''}">${meta.label}</span>
        <span class="inst-val ${dir} ${meta.isTotal ? 'inst-total' : ''}">${arr} ${Math.abs(parseFloat(netB)).toFixed(2)} 億</span>
      </div>`;
    });

    // 插入外資列（在投信後面，排序：外資→投信→自營商→三大合計）
    // 重新按固定順序輸出更清晰，這裡直接用 sorted 方式重新 render
    const ORDER = ['外資', '投信', '自營商', '三大合計'];
    const dataMap = {};
    rendered.forEach(label => {
      // 已在 html 中，需要重新建立 map
    });

    // 用 map 方式重建更乾淨
    const rowMap = {};
    if (foreignRow) rowMap['外資'] = foreignRow.net;
    rows.forEach(row => {
      const cat  = (row[0] || '').trim();
      const meta = instLabel(cat);
      if (!meta || meta.label === '外資') return;
      if (!rowMap[meta.label] && !meta.isTotal) rowMap[meta.label] = n(row[3]);
      if (meta.isTotal && !rowMap['三大合計']) rowMap['三大合計'] = n(row[3]);
    });

    const totalFound = Object.keys(rowMap).length;
    if (!totalFound) throw new Error('no matching rows');

    // 重建 html
    html = `<div class="inst-hd"><i class="fa-solid fa-building-columns" style="color:var(--warn)"></i> 三大法人買賣超（億元）${date ? `<span style="font-weight:400;color:var(--text3);margin-left:.5rem">${date}</span>` : ''}</div>`;
    ORDER.forEach(label => {
      if (!(label in rowMap)) return;
      const net  = rowMap[label];
      const netB = (net / 1e8).toFixed(2);
      const dir  = net > 0 ? 'up' : net < 0 ? 'down' : 'neu';
      const arr  = net > 0 ? '▲' : net < 0 ? '▼' : '─';
      const isT  = label === '三大合計';
      html += `<div class="inst-row">
        <span class="inst-label ${isT ? 'inst-total' : ''}">${label}</span>
        <span class="inst-val ${dir} ${isT ? 'inst-total' : ''}">${arr} ${Math.abs(parseFloat(netB)).toFixed(2)} 億</span>
      </div>`;
    });

    // 大盤成交值
    try {
      const r2    = await proxyFetch('https://openapi.twse.com.tw/v1/exchangeReport/FMTQIK');
      const rows2 = JSON.parse(await r2.text());
      if (Array.isArray(rows2) && rows2.length) {
        const last = rows2[rows2.length - 1];
        const val  = last['成交金額'] || '';
        const vol  = last['成交股數'] || '';
        const d2   = last['日期'] || '';
        if (val) {
          const valB = (parseFloat(val.replace(/,/g,'')) / 1e8).toFixed(0);
          html += `<div class="inst-hd"><i class="fa-solid fa-coins" style="color:var(--blue)"></i> 大盤成交（${d2}）</div>`;
          html += `<div class="mkt-vol-row"><span class="inst-label">成交值</span><span class="inst-val" style="color:var(--blue)">${valB} 億元</span></div>`;
          if (vol) html += `<div class="mkt-vol-row"><span class="inst-label">成交量</span><span class="inst-val">${fmtVol(parseInt(vol.replace(/,/g,'')))} 股</span></div>`;
        }
      }
    } catch (_) {}

    el.innerHTML = html;
  } catch (e) {
    console.warn('[Inst]', e.message);
    el.innerHTML = `<div class="inst-hd" style="color:var(--text3)"><i class="fa-solid fa-circle-exclamation"></i> 三大法人資料暫無法取得</div>`;
  }
}

// ==================== 中文股名 + 上櫃股價快取 ====================
const _twseNameCache = {};   // code → 中文名
const _otcPriceCache = {};   // code → { price, chg, pct, vol, ts }
const _otcSet = new Set();   // 已確認為上櫃的代號

function parseName(row) {
  return row.Name || row.StockName || row.CompanyName ||
         row['名稱'] || row['股票名稱'] || row['公司名稱'] ||
         row.SecuritiesCompanyName || row.Abb || '';
}

// 一次批次拉 TPEx 全部上櫃報價，建立名稱 + 股價快取
let _tpexLoaded = false;
async function loadTpexAll() {
  if (_tpexLoaded) return;
  try {
    const r = await proxyFetch('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes');
    const rows = JSON.parse(await r.text());
    if (!Array.isArray(rows) || !rows.length) return;
    _tpexLoaded = true;
    rows.forEach(row => {
      const code = String(row.SecuritiesCompanyCode || row.Code || row['代號'] || '').trim();
      if (!code) return;
      _otcSet.add(code);
      // 中文名
      if (!_twseNameCache[code]) {
        const name = parseName(row);
        if (name) _twseNameCache[code] = name;
      }
      // 股價：Close(收盤) or LastTrade
      const n = s => parseFloat(String(s||'0').replace(/,/g,'')) || 0;
      const price = n(row.Close) || n(row.ClosingPrice) || n(row.LastTrade) || n(row.TradePrice);
      if (!price) return;
      const prev  = n(row.PreviousClose) || n(row.YesterdayClosePrice) || n(row.OpeningPrice);
      const chgR  = n(row.Change) || n(row.PriceChange);
      const chg   = chgR || (prev ? price - prev : 0);
      const pct   = prev > 0 ? chg / prev * 100 : 0;
      const vol   = n(row.TradeVolume) || n(row.Volume) || n(row.TradingVolume);
      _otcPriceCache[code] = {
        symbol: code,
        regularMarketPrice: price,
        regularMarketChange: chg,
        regularMarketChangePercent: pct,
        regularMarketVolume: vol,
        volChgPct: null,
        regularMarketTime: Math.floor(Date.now() / 1000),
        shortName: _twseNameCache[code] || code,
      };
    });
  } catch (e) { console.warn('[TPEx all]', e.message); }
}

// 批次載入 TWSE 上市公司名稱（嘗試多個端點）
let _twseListLoaded = false;
async function loadTwseList() {
  if (_twseListLoaded) return;
  // 嘗試多個端點，取最先成功的
  const apis = [
    'https://openapi.twse.com.tw/v1/opendata/t187ap03_L',
    'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL',
  ];
  for (const apiUrl of apis) {
    try {
      const r = await proxyFetch(apiUrl);
      const rows = JSON.parse(await r.text());
      if (!Array.isArray(rows) || !rows.length) continue;
      let filled = 0;
      rows.forEach(row => {
        const code = String(
          row['公司代號'] || row['Code'] || row['StockNo'] || row['股票代號'] || ''
        ).trim();
        const name =
          row['公司簡稱'] || row['公司名稱'] || row['公司全名'] ||
          row['股票名稱'] || row['Name'] || row['StockName'] || parseName(row);
        if (code && name && !_twseNameCache[code]) {
          _twseNameCache[code] = name;
          filled++;
        }
      });
      if (filled > 0) { _twseListLoaded = true; return; }
    } catch (e) { console.warn('[TWSE list]', apiUrl, e.message); }
  }
}

async function fetchTwseNames(stocks) {
  const toFetch = stocks.filter(s => s && !_twseNameCache[s]);
  if (!toFetch.length) return;

  // ① 批次載入 TWSE 上市名稱（含全部上市股，一次解決）
  await loadTwseList();

  // ② 仍缺的（可能是上櫃）→ 嘗試 STOCK_DAY 逐一查
  const stillMissing = toFetch.filter(s => !_twseNameCache[s]);
  const needOtc = [];
  if (stillMissing.length) {
    await Promise.allSettled(stillMissing.map(async s => {
      try {
        const url = `https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY?stockNo=${s}`;
        const r = await proxyFetch(url);
        const rows = JSON.parse(await r.text());
        if (Array.isArray(rows) && rows.length) {
          const name = parseName(rows[0]);
          if (name) { _twseNameCache[s] = name; return; }
        }
      } catch (_) {}
      needOtc.push(s); // TWSE 都查不到 → 判定為上櫃
    }));
  }

  // ③ 上櫃：TPEx 批次（含名稱 + 股價）
  if (needOtc.length) {
    needOtc.forEach(s => _otcSet.add(s));
    await loadTpexAll();
  }
}

      </div>`;
    const ch  = q.regularMarketChange, pct = q.regularMarketChangePercent;

    const cls = ch > 0 ? 'up-card' : ch < 0 ? 'down-card' : '';
    // 中文股名（優先 TWSE/TPEx，備用 YF shortName，最後用代號）
    const cnName = _twseNameCache[stock] || (q.shortName && !/^\d/.test(q.shortName) ? q.shortName : null) || stock;
    // 量增減百分比

// 解析 Google News RSS <link>
// Google News RSS 的 <link> 是普通文字節點，DOMParser 解析後 textContent 即 URL
function gnLink(item) {
  // 方法①：<link> textContent（最可靠）
  const links = item.getElementsByTagName('link');
  for (let i = 0; i < links.length; i++) {
    const tc = links[i].textContent?.trim();
    if (tc && tc.startsWith('http')) return tc;
    // 某些 parser 把 URL 放在 nextSibling text node
    const nv = links[i].nextSibling?.nodeValue?.trim();
    if (nv && nv.startsWith('http')) return nv;
  }
  // 方法②：<guid>（Google News 的 guid 通常也是文章 URL）
  const guids = item.getElementsByTagName('guid');
  for (let i = 0; i < guids.length; i++) {
    const g = guids[i].textContent?.trim();
    if (g && g.startsWith('http')) return g;
  }
  return '';
}

  const allItems = [];
  const seen = new Set();

  // 每支股票查一次 Google News RSS（代號 + 中文名）
  const jobs = valid.slice(0, 10).map(async stock => {
    const cnName = _twseNameCache[stock] || '';
    const q = cnName ? `${cnName}` : stock;   // 優先用中文名搜尋
    const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`;
    try {
      const r = await proxyFetch(rssUrl);
      const text = await r.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      if (xml.querySelector('parsererror')) throw new Error('parse error');
      const items = Array.from(xml.getElementsByTagName('item')).slice(0, 4);
      return items.map(item => ({
        _ticker: stock,
        _name:   cnName || stock,
        title:   item.querySelector('title')?.textContent?.trim() || '',
        link:    gnLink(item),
        publisher: item.querySelector('source')?.textContent?.trim() || '',
        _ts:     new Date(item.querySelector('pubDate')?.textContent || 0).getTime() || 0,
      })).filter(n => n.title);
    } catch (_) { return []; }
  });

  const res = await Promise.allSettled(jobs);
  res.forEach(r => { if (r.status === 'fulfilled') allItems.push(...r.value); });

  const top = allItems
    .filter(n => { if (!n.title || seen.has(n.title)) return false; seen.add(n.title); return true; })
    .sort((a, b) => b._ts - a._ts)
    .slice(0, 20);

  if (!top.length) {
    el.innerHTML = `<div class="err"><i class="fa-solid fa-triangle-exclamation"></i> 暫無相關新聞<br><small style="color:var(--text3)">請確認自選股已設定</small></div>`;
    return;
  }

  el.innerHTML = top.map(n => `
    <div class="pn-item">
      <a href="${n.link}" target="_blank" rel="noopener">
        <div class="pn-title">${esc(n.title)}</div>
      </a>
      <div class="pn-meta">
        <span class="tag tag-ticker">${esc(n._ticker)}${n._name && n._name !== n._ticker ? ' ' + esc(n._name) : ''}</span>
        ${n.publisher ? `<span class="ntime">${esc(n.publisher)}</span>` : ''}
        <span class="ntime">${n._ts ? ago(n._ts) : ''}</span>
      </div>
    </div>`).join('');

  id('pnTs').textContent = fmtTs(Date.now());
}

          </a>
          <div class="ev-note">${esc(e.note)}</div>
        </div>
      </div>`).join('');
    return `<div class="${dayCls}"><div class="fin-day-lbl">${lbl}</div>${evHtml}</div>`;
  }).join('');
}

// ==================== 翻譯工具（Google Translate 免費端點）====================
async function translateZhTW(text) {
  if (!text) return text;
  // 若已含中文字則不翻譯
  if (/[\u4e00-\u9fff]/.test(text)) return text;
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
    const d = await r.json();
    return (d[0] || []).map(s => s[0] || '').join('') || text;
  } catch (_) {
    // fallback via proxy
    try {
      const url2 = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`;
      const r2 = await proxyFetch(url2);
      const d2 = JSON.parse(await r2.text());
      return (d2[0] || []).map(s => s[0] || '').join('') || text;
    } catch (__) { return text; }
  }
}

// ==================== REDDIT ====================
async function fetchReddit() {
  const el = id('redditContent');
  const subs = ['Stocks', 'investing', 'wallstreetbets'];
  const allPosts = [];

  const jobs = subs.map(async sub => {
    const apiUrl = `https://www.reddit.com/r/${sub}/hot.json?limit=8&raw_json=1`;
    let d = null;
    // Try direct fetch first; if CORS blocked, fall back to proxy
    try {
      const r = await fetch(apiUrl, { signal: AbortSignal.timeout(6000) });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      d = await r.json();
    } catch (_) {
      try {
        const r2 = await proxyFetch(apiUrl);
        d = JSON.parse(await r2.text());
      } catch (__) { return []; }
    }
    return (d?.data?.children || []).map(c => ({ ...c.data, _sub: sub }));
  });

  const res = await Promise.allSettled(jobs);
  res.forEach(r => { if (r.status === 'fulfilled') allPosts.push(...r.value); });

  if (!allPosts.length) {
    el.innerHTML = `<div class="err"><i class="fa-solid fa-triangle-exclamation"></i> 載入失敗<br>
      <a href="https://www.reddit.com/r/stocks/" target="_blank">前往 Reddit/stocks</a></div>`;
    return;
  }

  const top = allPosts
    .filter(p => !p.stickied && p.title)
    .sort((a, b) => b.ups - a.ups)
    .slice(0, 5);

  // 並行翻譯所有標題為繁體中文
  const translated = await Promise.allSettled(top.map(p => translateZhTW(p.title)));

  el.innerHTML = top.map((p, i) => {
    const zhTitle = translated[i]?.status === 'fulfilled' ? translated[i].value : p.title;
    return `
    <div class="reddit-item">
      <a href="https://reddit.com${p.permalink}" target="_blank" rel="noopener">
        <div class="reddit-title">${esc(zhTitle)}</div>
        ${zhTitle !== p.title ? `<div style="font-size:.62rem;color:var(--text3);margin-top:.15rem">${esc(p.title)}</div>` : ''}
      </a>
      <div class="reddit-meta">
        <span class="r-ups"><i class="fa-solid fa-arrow-up"></i> ${fmtK(p.ups)}</span>
        <span class="r-cmt"><i class="fa-solid fa-comment"></i> ${fmtK(p.num_comments)}</span>
        <span class="tag tag-reddit">r/${p._sub}</span>
        <span class="ntime">${ago(p.created_utc * 1000)}</span>
      </div>
    </div>`;
  }).join('');
}

// ==================== PTT (Atom format) ====================
// PTT rss.ptt.cc 實際為 Atom 格式：<feed>/<entry>，非 RSS 2.0 <channel>/<item>
// 快取 5 分鐘，避免頻繁呼叫被限速
const _pttCache = { ts: 0, html: '' };
const PTT_TTL   = 5 * 60 * 1000;

async function fetchPTT() {
  const el = id('pttContent');

  // 有效快取直接使用
  if (_pttCache.html && Date.now() - _pttCache.ts < PTT_TTL) {
    el.innerHTML = _pttCache.html;
    return;
  }

  try {
    const r = await fetch(
      CFG.proxyA + encodeURIComponent('http://rss.ptt.cc/Stock.xml'),
      { signal: AbortSignal.timeout(10000) }
    );
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const text = await r.text();

    const xml = new DOMParser().parseFromString(text, 'text/xml');
    if (xml.querySelector('parsererror')) throw new Error('XML parse error');

    // Atom 格式：文章為 <entry>
    const entries = xml.getElementsByTagName('entry');
    if (!entries.length) throw new Error('No <entry> found in Atom feed');

    const posts = Array.from(entries).slice(0, 5).map(entry => {
      // Atom <link> 用 href 屬性，不是文字內容
      const linkEl = entry.querySelector('link[rel="alternate"]') || entry.querySelector('link');
      const url    = linkEl?.getAttribute('href') || '';
      // 作者：<author><name>
      const author = entry.getElementsByTagName('name')[0]?.textContent?.trim() || '';
      // 時間：<published> 或 <updated>
      const pubRaw = entry.getElementsByTagName('published')[0]?.textContent?.trim()
                  || entry.getElementsByTagName('updated')[0]?.textContent?.trim() || '';
      return {
        title: entry.getElementsByTagName('title')[0]?.textContent?.trim() || '',
        url, author, pubRaw,
      };
    });

    const html = posts.map(p => `
      <div class="ptt-item">
        <a href="${p.url || 'https://www.ptt.cc/bbs/Stock/'}" target="_blank" rel="noopener">
          <div class="ptt-title">${esc(p.title)}</div>
        </a>
        <div class="ptt-meta">
          <span class="ptt-author"><i class="fa-regular fa-user"></i> ${esc(p.author)}</span>
          <span class="ntime">${p.pubRaw ? ago(new Date(p.pubRaw).getTime()) : ''}</span>
        </div>
      </div>`).join('');

    _pttCache.html = html;
    _pttCache.ts   = Date.now();
    el.innerHTML   = html;

  } catch (e) {
    console.warn('[PTT]', e.message);
    if (_pttCache.html) {
      el.innerHTML = _pttCache.html +
        '<p style="font-size:.65rem;color:var(--text3);text-align:center;margin-top:.4rem">（快取資料）</p>';
    } else {
      el.innerHTML = `<div class="err">
        <i class="fa-solid fa-triangle-exclamation"></i> PTT 載入失敗<br>
        <a href="https://www.ptt.cc/bbs/Stock/" target="_blank">前往 PTT Stock 板</a>
      </div>`;
    }
  }
}

// ==================== FINANCE NEWS (Google News RSS) ====================
// Google News RSS: stable, supports Chinese keywords, no API key needed
const _finCache = { ts: 0, html: '' };
const FIN_TTL   = 5 * 60 * 1000;

async function fetchFinanceNews() {
  const el = id('finContent');

  if (_finCache.html && Date.now() - _finCache.ts < FIN_TTL) {
    el.innerHTML = _finCache.html;
    return;
  }

  // Google News RSS for TW financial keywords
  const queries = ['台股 股市', '美股 那斯達克', '台積電 2330', '財經 投資'];
  const allItems = [];

  const jobs = queries.map(async q => {
    const rssUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=zh-TW&gl=TW&ceid=TW:zh-Hant`;
    try {
      const r = await proxyFetch(rssUrl);
      const text = await r.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      if (xml.querySelector('parsererror')) return [];
      return Array.from(xml.getElementsByTagName('item')).slice(0, 5).map(item => ({
        title:     item.getElementsByTagName('title')[0]?.textContent?.trim() || '',
        link:      gnLink(item),
        publisher: item.querySelector('source')?.textContent?.trim() || '',
        pubDate:   item.getElementsByTagName('pubDate')[0]?.textContent?.trim() || '',
        _ts:       new Date(item.getElementsByTagName('pubDate')[0]?.textContent || 0).getTime() || 0,
      })).filter(n => n.title);
    } catch (_) { return []; }
  });

  const res = await Promise.allSettled(jobs);
  res.forEach(r => { if (r.status === 'fulfilled') allItems.push(...r.value); });

  if (!allItems.length) {
    // last resort: try Yahoo Finance TW RSS
    try {
      const r = await proxyFetch('https://tw.news.yahoo.com/rss/finance');
      const text = await r.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');
      Array.from(xml.querySelectorAll('item')).slice(0, 5).forEach(item => {
        allItems.push({
          title:     item.getElementsByTagName('title')[0]?.textContent?.trim() || '',
          link:      gnLink(item),
          publisher: 'Yahoo Finance',
          pubDate:   item.getElementsByTagName('pubDate')[0]?.textContent?.trim() || '',
          _ts:       new Date(item.getElementsByTagName('pubDate')[0]?.textContent || 0).getTime() || 0,
        });
      });
    } catch (_) {}
  }

  if (!allItems.length) {
    el.innerHTML = '<div class="err"><i class="fa-solid fa-triangle-exclamation"></i> 財經新聞載入失敗<br><small>請稍後重試</small></div>';
    return;
  }

  // Deduplicate by title, sort by time desc, take top 10
  const seen = new Set();
  const top = allItems
    .filter(n => { if (!n.title || seen.has(n.title)) return false; seen.add(n.title); return true; })
    .sort((a, b) => b._ts - a._ts)
    .slice(0, 5);

  const html = top.map((n, i) => {
    const rankCls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    return `
      <div class="news-item">
        <div style="display:flex;align-items:flex-start;gap:.4rem">
          <span class="news-rank ${rankCls}">#${i+1}</span>
          <a href="${n.link}" target="_blank" rel="noopener" style="flex:1">
            <div class="news-title">${esc(n.title)}</div>
          </a>
        </div>
        <div class="news-meta" style="padding-left:1.7rem">
          ${n.publisher ? `<span class="tag tag-src">${esc(n.publisher)}</span>` : ''}
          <span class="ntime">${n._ts ? ago(n._ts) : ''}</span>
        </div>
      </div>`;
  }).join('');

  _finCache.html = html;
  _finCache.ts   = Date.now();
  el.innerHTML   = html;
}

// ==================== REFRESH ====================
async function refreshAll() {
  const btn = id('refreshBtn');
  if (btn) { btn.classList.add('spinning'); btn.disabled = true; }

  fetchFinCal(); // 同步，不需 await
  // fetchPortfolio 先跑（填充 _twseNameCache），完成後再跑 fetchPortNews
  await Promise.allSettled([
    fetchTL(),
    fetchMarkets(),
    fetchPortfolio().then(() => fetchPortNews()),
    fetchReddit(),
    fetchPTT(),
    fetchFinanceNews(),
  ]);

  if (btn) { btn.classList.remove('spinning'); btn.disabled = false; }
}

// ==================== UTILS ====================
const id = s => document.getElementById(s);

function fmtN(n, d = 2) {
  if (n == null || isNaN(n)) return '--';
  return n.toLocaleString('zh-TW', { minimumFractionDigits: d, maximumFractionDigits: d });
}

function fmtVol(v) {
  if (!v) return '--';
  if (v >= 1e8) return (v / 1e8).toFixed(2) + '億';
  if (v >= 1e4) return (v / 1e4).toFixed(1) + '萬';
  return v.toLocaleString();
}

function fmtK(n) {
  if (!n) return '0';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return '' + n;
}

function fmtTs(ms) {
  return new Date(ms).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
}

function ago(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return '剛剛';
  if (s < 3600) return `${Math.floor(s/60)}分前`;
  if (s < 86400) return `${Math.floor(s/3600)}小時前`;
  if (s < 2592000) return `${Math.floor(s/86400)}天前`;
  return new Date(ms).toLocaleDateString('zh-TW');
}

function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}
