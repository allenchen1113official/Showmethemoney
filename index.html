<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Show Me The Money - 台股看盤系統，即時股價、景氣燈號、財經新聞">
  <title>💰 Show Me The Money - 台股看盤</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #656d76;
      --blue: #388bfd;
      --up: #f85149;    /* 台灣慣例：上漲=紅 */
      --down: #3fb950;  /* 台灣慣例：下跌=綠 */
      --warn: #d29922;
      --card-radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #1a1f2e 0%, #0d1117 100%);
      border-bottom: 1px solid var(--border);
      padding: 0.65rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 0.75rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      flex-shrink: 0;
    }
    .logo-icon { font-size: 1.75rem; }
    .logo h1 {
      font-size: 1.15rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }
    .logo .sub { font-size: 0.68rem; color: var(--text2); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .badge {
      font-size: 0.72rem;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-open { background: rgba(63,185,80,.15); color: var(--up); border: 1px solid rgba(63,185,80,.4); }
    .badge-closed { background: rgba(139,148,158,.1); color: var(--text2); border: 1px solid rgba(139,148,158,.3); }

    .clock { text-align: right; }
    .clock-time {
      font-size: 1.15rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--blue);
    }
    .clock-date { font-size: 0.65rem; color: var(--text2); }

    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 0.3rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.78rem;
      transition: all .2s;
      white-space: nowrap;
    }
    .btn-icon:hover { border-color: var(--blue); color: var(--blue); }
    .btn-icon.spinning i { animation: spin 1s linear infinite; }

    /* ===== QUOTE BANNER ===== */
    #quoteBanner {
      background: linear-gradient(90deg, rgba(26,31,46,0.98) 0%, rgba(22,27,34,0.95) 100%);
      border-bottom: 1px solid rgba(255,215,0,0.18);
      padding: 0.55rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      min-height: 42px;
    }
    .quote-icon {
      font-size: 1.2rem;
      color: #ffd700;
      flex-shrink: 0;
      opacity: 0.85;
    }
    .quote-body {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .quote-text {
      font-size: 0.82rem;
      color: #e6d8a8;
      font-style: italic;
      letter-spacing: 0.02em;
      line-height: 1.4;
    }
    .quote-text::before { content: '「'; color: #ffd700; font-style: normal; font-weight: 700; }
    .quote-text::after  { content: '」'; color: #ffd700; font-style: normal; font-weight: 700; }
    .quote-author {
      font-size: 0.75rem;
      color: #ffd700;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0.9;
    }
    .quote-author::before { content: '— '; }
    .quote-cat {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 999px;
      background: rgba(255,215,0,0.1);
      color: rgba(255,215,0,0.65);
      border: 1px solid rgba(255,215,0,0.2);
      white-space: nowrap;
    }
    .quote-refresh {
      background: none;
      border: none;
      color: rgba(255,215,0,0.45);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.15rem 0.3rem;
      border-radius: 4px;
      transition: color .2s;
      flex-shrink: 0;
    }
    .quote-refresh:hover { color: #ffd700; }

    /* ===== MAIN GRID ===== */
    .main {
      max-width: 1900px;
      margin: 0 auto;
      padding: 0.9rem;
      display: grid;
      grid-template-columns: 270px 1fr 330px;
      gap: 0.9rem;
      align-items: start;
    }

    /* ===== CARD ===== */
    .card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      overflow: hidden;
      margin-bottom: 0.9rem;
    }
    .card:last-child { margin-bottom: 0; }

    .card-hd {
      padding: 0.6rem 0.9rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,.02);
    }
    .card-title {
      font-size: 0.82rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.45rem;
    }
    .card-title i { color: var(--blue); }
    .card-bd { padding: 0.75rem 0.9rem; }

    .ts { font-size: 0.65rem; color: var(--text3); }

    /* ===== TRAFFIC LIGHT ===== */
    .tl-wrap {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.3rem 0;
    }
    .tl-bulb {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,.08);
    }
    .tl-label { font-size: 1rem; font-weight: 700; }
    .tl-sub { font-size: 0.75rem; color: var(--text2); margin-top: 0.15rem; }
    .tl-date { font-size: 0.65rem; color: var(--text3); margin-top: 0.1rem; }
    .tl-link {
      display: block;
      text-align: center;
      font-size: 0.68rem;
      color: var(--blue);
      text-decoration: none;
      margin-top: 0.4rem;
      padding-top: 0.4rem;
      border-top: 1px solid var(--border);
    }
    .tl-link:hover { text-decoration: underline; }

    /* ===== MARKET ITEMS ===== */
    .mkt-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .mkt-item:last-child { border-bottom: none; }
    .mkt-left { display: flex; align-items: center; gap: 0.55rem; }
    .mkt-flag { font-size: 1.2rem; }
    .mkt-name { font-size: 0.88rem; font-weight: 600; }
    .mkt-sub { font-size: 0.7rem; color: var(--text2); }
    .mkt-right { text-align: right; }
    .mkt-price { font-size: 1rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .mkt-chg { font-size: 0.75rem; font-variant-numeric: tabular-nums; }

    .up { color: var(--up); }
    .down { color: var(--down); }
    .neu { color: var(--text2); }

    /* ===== PORTFOLIO GRID ===== */
    .port-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
      padding: 0.75rem 0.9rem;
    }
    .stock-card {
      background: rgba(255,255,255,.025);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 7px;
      padding: 0.65rem 0.7rem;
      cursor: pointer;
      transition: all .2s;
      min-width: 0;
    }
    .stock-card:hover { border-color: var(--blue); background: rgba(56,139,253,.05); }
    .stock-card.up-card { border-left-color: var(--up); }
    .stock-card.down-card { border-left-color: var(--down); }
    .s-code { font-size: 0.82rem; font-weight: 700; color: var(--blue); }
    .s-name { font-size: 0.78rem; color: var(--text2); margin-top: 0.1rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .s-price { font-size: 1.15rem; font-weight: 700; margin-top: 0.35rem; font-variant-numeric: tabular-nums; }
    .s-chg { font-size: 0.78rem; font-variant-numeric: tabular-nums; }
    .s-vol { font-size: 0.7rem; color: var(--text3); margin-top: 0.15rem; }

    /* ===== INSTITUTIONAL ===== */
    .inst-hd {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text2);
      margin: 0.6rem 0 0.35rem;
      padding-top: 0.55rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .inst-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.22rem 0;
      font-size: 0.72rem;
      border-bottom: 1px solid rgba(255,255,255,.03);
    }
    .inst-row:last-child { border-bottom: none; }
    .inst-label { color: var(--text2); }
    .inst-val { font-variant-numeric: tabular-nums; font-weight: 600; }
    .inst-total { color: var(--warn); font-weight: 700; }
    .mkt-vol-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.22rem 0;
      font-size: 0.72rem;
      border-bottom: 1px solid rgba(255,255,255,.03);
    }
    .night-badge {
      font-size: 0.6rem;
      background: rgba(255,215,0,.15);
      color: #ffd700;
      border: 1px solid rgba(255,215,0,.3);
      border-radius: 3px;
      padding: 0.05rem 0.3rem;
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    /* ===== NEWS ITEMS ===== */
    .news-item {
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .news-item:last-child { border-bottom: none; }
    .news-item a { text-decoration: none; color: inherit; }
    .news-title {
      font-size: 0.78rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .2s;
    }
    .news-item:hover .news-title { color: var(--blue); }
    .news-meta { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.25rem; flex-wrap: wrap; }
    .news-rank { font-size: 0.7rem; font-weight: 700; color: var(--text3); width: 1.3rem; flex-shrink: 0; }
    .news-rank.gold { color: #ffd700; }
    .news-rank.silver { color: #c0c0c0; }
    .news-rank.bronze { color: #cd7f32; }
    .tag { font-size: 0.62rem; padding: 0.1rem 0.3rem; border-radius: 3px; }
    .tag-src { background: rgba(255,255,255,.06); color: var(--text3); }
    .tag-ticker { background: rgba(56,139,253,.12); color: var(--blue); font-weight: 600; }
    .tag-reddit { background: rgba(255,99,20,.12); color: #ff6314; }
    .ntime { font-size: 0.62rem; color: var(--text3); }

    /* ===== PTT ITEMS ===== */
    .ptt-item {
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .ptt-item:last-child { border-bottom: none; }
    .ptt-item a { text-decoration: none; color: inherit; }
    .ptt-title { font-size: 0.78rem; line-height: 1.4; transition: color .2s; }
    .ptt-item:hover .ptt-title { color: var(--blue); }
    .ptt-meta { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.2rem; }
    .ptt-push { font-size: 0.68rem; font-weight: 600; }
    .ptt-author { font-size: 0.62rem; color: var(--text3); }

    /* ===== REDDIT ITEMS ===== */
    .reddit-item {
      padding: 0.55rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .reddit-item:last-child { border-bottom: none; }
    .reddit-item a { text-decoration: none; color: inherit; }
    .reddit-title {
      font-size: 0.78rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .2s;
    }
    .reddit-item:hover .reddit-title { color: var(--blue); }
    .reddit-meta { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.2rem; flex-wrap: wrap; }
    .r-ups { font-size: 0.65rem; color: #ff6314; }
    .r-cmt { font-size: 0.62rem; color: var(--text3); }

    /* ===== TABS ===== */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.015);
    }
    .tab {
      padding: 0.5rem 0.8rem;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--text2);
      border-bottom: 2px solid transparent;
      transition: all .2s;
      white-space: nowrap;
    }
    .tab.active { color: var(--blue); border-bottom-color: var(--blue); }
    .tab:hover { color: var(--text); }

    .tab-pane { display: none; padding: 0.75rem 0.9rem; }
    .tab-pane.active { display: block; }

    /* ===== PORTFOLIO NEWS ===== */
    .pn-item {
      padding: 0.5rem 0;
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .pn-item:last-child { border-bottom: none; }
    .pn-item a { text-decoration: none; color: inherit; }
    .pn-title {
      font-size: 0.76rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: color .2s;
    }
    .pn-item:hover .pn-title { color: var(--blue); }
    .pn-meta { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.2rem; }

    /* ===== MODAL ===== */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.72);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .overlay.show { display: flex; }

    .modal {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.4rem;
      width: 100%;
      max-width: 460px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-hd {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-close {
      background: none;
      border: none;
      color: var(--text2);
      cursor: pointer;
      font-size: 1.1rem;
      transition: color .2s;
    }
    .modal-close:hover { color: var(--text); }
    .modal-hint { font-size: 0.72rem; color: var(--text2); margin-bottom: 0.9rem; }

    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.55rem;
      margin-bottom: 1rem;
    }
    .input-item { display: flex; flex-direction: column; gap: 0.2rem; }
    .input-item label { font-size: 0.7rem; color: var(--text2); }
    .input-item input {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.38rem 0.55rem;
      color: var(--text);
      font-size: 0.82rem;
      font-family: inherit;
      transition: border-color .2s;
    }
    .input-item input:focus { outline: none; border-color: var(--blue); }

    .modal-foot { display: flex; gap: 0.65rem; justify-content: flex-end; }
    .btn-prim {
      background: var(--blue);
      border: none;
      color: #fff;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      transition: opacity .2s;
    }
    .btn-prim:hover { opacity: .85; }
    .btn-sec {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 0.45rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      transition: all .2s;
    }
    .btn-sec:hover { border-color: var(--text); color: var(--text); }

    /* ===== STATES ===== */
    .loading {
      text-align: center;
      color: var(--text3);
      padding: 1rem;
      font-size: 0.78rem;
    }
    .loading i { animation: spin 1s linear infinite; }
    .err { text-align: center; color: var(--down); padding: 0.75rem; font-size: 0.75rem; }
    .err a { color: var(--blue); }

    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ===== FINANCIAL CALENDAR ===== */
    .fin-day { margin-bottom: .75rem; }
    .fin-day:last-child { margin-bottom: 0; }
    .fin-day-lbl {
      font-size: .7rem; font-weight: 700; color: var(--blue);
      border-bottom: 1px solid var(--border); padding-bottom: .2rem; margin-bottom: .3rem;
      display: flex; align-items: center; gap: .4rem;
    }
    .fin-day-today .fin-day-lbl { color: #ffd700; }
    .fin-event {
      display: flex; align-items: flex-start; gap: .5rem;
      padding: .28rem 0; border-bottom: 1px solid rgba(255,255,255,.03);
      font-size: .75rem; line-height: 1.4;
    }
    .fin-event:last-child { border-bottom: none; }
    .ev-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; margin-top: .35rem;
    }
    .ev-fed   { background: #f0a500; }
    .ev-cbc   { background: var(--blue); }
    .ev-data  { background: #a371f7; }
    .ev-earn  { background: #e040fb; }
    .ev-mkt   { background: #3fb950; }
    .ev-name  { color: var(--text); }
    .ev-note  { font-size: .65rem; color: var(--text3); margin-top: .05rem; }
    .ev-imp-high .ev-name { font-weight: 600; }
    .fin-empty { font-size: .75rem; color: var(--text3); text-align: center; padding: .5rem 0; }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 0.9rem;
      font-size: 0.65rem;
      color: var(--text3);
      border-top: 1px solid var(--border);
      margin-top: 0.5rem;
    }
    .footer a { color: var(--blue); text-decoration: none; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 1300px) {
      .main { grid-template-columns: 250px 1fr 300px; }
    }
    @media (max-width: 1050px) {
      .main { grid-template-columns: 1fr 1fr; }
      .right-col { grid-column: 1 / -1; }
    }
    @media (max-width: 720px) {
      .main { grid-template-columns: 1fr; padding: 0.6rem; gap: 0; }
      .right-col { grid-column: auto; }
      .card { margin-bottom: 0.6rem; }
      header { flex-wrap: wrap; }
      .header-right { gap: 0.6rem; }
      .clock-time { font-size: 1rem; }
      .port-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 420px) {
      .port-grid { grid-template-columns: 1fr; }
      .input-grid { grid-template-columns: 1fr; }
      .logo h1 { font-size: 0.95rem; }
    }

    /* ===== AUTH AREA (HEADER) ===== */
    .auth-area { display: flex; align-items: center; gap: 0.45rem; }
    .auth-user {
      font-size: 0.68rem; color: var(--text2);
      max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .auth-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text2); padding: 0.25rem 0.55rem;
      border-radius: 6px; cursor: pointer; font-size: 0.72rem;
      font-family: inherit; transition: all .2s; white-space: nowrap;
    }
    .auth-btn:hover { border-color: var(--blue); color: var(--blue); }
    .auth-btn.auth-signout { border-color: rgba(248,81,73,.35); color: #f85149; }
    .auth-btn.auth-signout:hover { border-color: #f85149; }

    /* ===== SYNC ICON ===== */
    .sync-icon { font-size: 0.7rem; margin-left: 0.4rem; vertical-align: middle; }
    .sync-icon.synced   { color: #3fb950; }
    .sync-icon.syncing  { color: var(--blue); animation: spin .9s linear infinite; }
    .sync-icon.sync-err { color: #f85149; }
    .sync-icon.offline  { color: var(--text3); }

    /* ===== AUTH MODAL ===== */
    #authOverlay {
      display: none; position: fixed; inset: 0;

// ==================== SUPABASE CONFIG ====================
// 憑證從外部 config.js (已加入 .gitignore) 注入 window.SMTM_CONFIG
// v2: 憑證使用 AES-GCM + hostname 衍生金鑰加密，防止他人直接複製使用
let SUPABASE_URL = '', SUPABASE_ANON_KEY = '';

async function _decryptConfig() {
  const cfg = window.SMTM_CONFIG;
  if (!cfg) return;
  if (cfg._v !== 2) {
    // v1 (明文，相容舊 config)
    SUPABASE_URL      = cfg.SUPABASE_URL      || '';
    SUPABASE_ANON_KEY = cfg.SUPABASE_ANON_KEY || '';
    return;
  }
  // v2: AES-GCM 解密
  const host = location.hostname || 'localhost';
  if (cfg._hosts && !cfg._hosts.includes(host)) return; // 非授權網域，直接放棄
  try {
    const salt = new TextEncoder().encode('smtm-v2-salt-2026');
    const keyMat = await crypto.subtle.importKey('raw', new TextEncoder().encode(host), 'PBKDF2', false, ['deriveKey']);
    const aesKey = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMat, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );
    const dec = async (b64) => {
      const buf = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
      const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: buf.slice(0, 12) }, aesKey, buf.slice(12));
      return new TextDecoder().decode(plain);
    };
    SUPABASE_URL      = await dec(cfg.SUPABASE_URL);
    SUPABASE_ANON_KEY = await dec(cfg.SUPABASE_ANON_KEY);
  } catch (e) { console.warn('Config decrypt failed:', e.message); }
}

// 備援輔助：proxyFetch 主介接，失敗時自動切換備援
async function apiFetch(priUrl, bakUrl = null) {
  try { return await proxyFetch(priUrl); } catch (_) {}
  if (bakUrl) return await proxyFetch(bakUrl);
  throw new Error('apiFetch: all endpoints failed');
}
// 備援輔助：CORS 直連主介接，失敗時走 proxy 備援
async function apiCors(priUrl, bakUrl = null, timeout = 8000) {
  try {
    const r = await fetch(priUrl, { signal: AbortSignal.timeout(timeout) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r;
  } catch (_) {}
  if (bakUrl) return await proxyFetch(bakUrl);
  throw new Error('apiCors: all endpoints failed');
}

// ==================== SUPABASE STATE ====================
let _sb       = null;   // Supabase client instance
let _sbUser   = null;   // current auth user or null
let _authMode = 'login'; // 'login' | 'signup'

function initSupabase() {
  if (!window.supabase || !SUPABASE_URL || !SUPABASE_ANON_KEY ||
      SUPABASE_URL.includes('YOUR_PROJECT_ID') || SUPABASE_ANON_KEY.includes('YOUR_ANON_KEY')) return;
  try {
    _sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch(e) {
    console.warn('Supabase init failed:', e.message);
    _sb = null;
  }
}

function setupAuthListener() {
  if (!_sb) { updateAuthUI(null); return; }
  // Restore existing session immediately
  _sb.auth.getSession().then(({ data }) => {
    _sbUser = data?.session?.user ?? null;
    updateAuthUI(_sbUser);
    if (_sbUser) syncFromCloud();
  });
  // Watch for login / logout events
  _sb.auth.onAuthStateChange((_event, session) => {
    _sbUser = session?.user ?? null;
    updateAuthUI(_sbUser);
    if (_event === 'SIGNED_IN')  syncFromCloud();
    if (_event === 'SIGNED_OUT') setSyncIcon('offline', '未登入，使用本機儲存');
  });
}

// ==================== SYNC HELPERS ====================
function setSyncIcon(state, title) {
  const el = id('syncIcon');
  if (!el) return;
  const icons = { synced:'fa-cloud', syncing:'fa-rotate', 'sync-err':'fa-cloud', offline:'fa-cloud' };
  el.className = `fa-solid ${icons[state] || 'fa-cloud'} sync-icon ${state}`;
  el.title = title || '';
}

async function syncFromCloud() {
  if (!_sb || !_sbUser) return;
  setSyncIcon('syncing', '從雲端同步中…');
  try {
    const { data, error } = await _sb
      .from('portfolios')
      .select('stocks')
      .eq('user_id', _sbUser.id)
      .maybeSingle();
    if (error) throw error;
    if (data?.stocks?.length) {
      portfolio = data.stocks.slice(0, 10);
      while (portfolio.length < 10) portfolio.push('');
      localStorage.setItem('smtm_port', JSON.stringify(portfolio));
      sessionStorage.removeItem('smtm_port_cache');
      fetchPortfolio();
      fetchPortNews();
    }
    setSyncIcon('synced', `已同步：${_sbUser.email}`);
  } catch (e) {
    console.error('[Supabase sync]', e);
    setSyncIcon('sync-err', '同步失敗：' + e.message);
  }
}

async function pushToCloud(stocks) {
  if (!_sb || !_sbUser) return;
  setSyncIcon('syncing', '儲存至雲端…');
  try {
    const { error } = await _sb.from('portfolios').upsert({
      user_id:    _sbUser.id,
      stocks:     stocks,
      updated_at: new Date().toISOString(),
    }, { onConflict: 'user_id' });
    if (error) throw error;
    setSyncIcon('synced', `已同步：${_sbUser.email}`);
  } catch (e) {
    console.error('[Supabase push]', e);
    setSyncIcon('sync-err', '雲端儲存失敗：' + e.message);
  }
}

function updateAuthUI(user) {
  const area = id('authArea');
  if (!area) return;
  if (!_sb) {
    // Supabase not configured — hide auth area entirely
    area.innerHTML = '';
    return;
  }
  if (user) {
    const email = user.email || '';
    area.innerHTML = `
      <span class="auth-user" title="${esc(email)}">${esc(email)}</span>
      <button class="auth-btn auth-signout" onclick="handleSignOut()">
        <i class="fa-solid fa-right-from-bracket"></i> 登出
      </button>`;
    setSyncIcon('synced', `已登入：${email}`);
  } else {
    area.innerHTML = `
      <button class="auth-btn" onclick="openAuthModal()">
        <i class="fa-solid fa-user"></i> 登入
      </button>`;
    setSyncIcon('offline', '未登入，使用本機儲存');
  }
}

            <strong>建議關閉 Email 確認功能（一次性設定）：</strong><br>
            <span style="font-family:monospace;font-size:0.72rem">
              Supabase → Authentication<br>
              → Providers → Email<br>
              → 關閉「Confirm email」
            </span><br><br>
            關閉後，註冊即可直接登入，不需收信確認。
          </div>
        </div>`;
      msgEl.className = 'auth-msg';
      id('authToggle').textContent = '返回登入';
      id('authToggle').onclick = () => {
        id('authSubmitBtn').style.display = '';
        id('authToggle').onclick = toggleAuthMode;
        toggleAuthMode();
      };
      return;
    }
    // Translate common Supabase errors to Chinese
    const errMap = [
      ['Invalid login credentials',               '帳號或密碼錯誤'],
      ['Email not confirmed',                      '請先至信箱點擊確認連結後再登入'],
      ['User already registered',                  '此 Email 已註冊，請直接登入'],
      ['Password should be at least 6 characters', '密碼至少需要 6 個字元'],
      ['signup is disabled',                       '目前暫停開放新帳號申請'],

    const found = errMap.find(([k]) => em.toLowerCase().includes(k.toLowerCase()));
    msgEl.textContent = found ? found[1] : em;

// ==================== FETCH HELPERS ====================
// Proxy 競速：三個 proxy 同時出發（略微錯開），取最快成功者
// 避免 rate limit 同時打爆同一 proxy，又比逐一嘗試快 3 倍
async function proxyFetch(url) {
  const BAD = ['Rate limit exceeded', 'Edge: Too', 'Server-side requests are not allowed',
               'Temporary key expired', 'Too Many Requests', '<!DOCTYPE', '<html'];
  const isGood = t => !BAD.some(s => t.slice(0, 300).includes(s));
  const mkResp = t => new Response(t, { status: 200, headers: { 'Content-Type': 'text/plain' } });

  const tryProxy = async (px, delay) => {
    if (delay) await new Promise(r => setTimeout(r, delay));
    const r = await fetch(px + encodeURIComponent(url), { signal: AbortSignal.timeout(8000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const t = await r.text();
    if (!isGood(t)) throw new Error('bad response: ' + t.slice(0, 80));
    return mkResp(t);
  };

  try {
    // cors.lol 立即, allorigins 錯開 300ms, codetabs 錯開 600ms, 直接 1200ms
    return await Promise.any([
      tryProxy(CFG.proxyA, 0),
      tryProxy(CFG.proxyB, 300),
      tryProxy(CFG.proxyC, 600),
      (async () => {
        await new Promise(r => setTimeout(r, 1200));
        const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
        if (!r.ok) throw new Error(`direct HTTP ${r.status}`);
        return r;
      })(),
    ]);
  } catch {
    throw new Error('All proxies failed for: ' + url);
  }
}

// 單支股票：使用 v8 chart API（range=5d 以取得前一日成交量作比較）
async function yfQuote(symbol) {
  // ★ 台股快取優先順序：即時 MIS > STOCK_DAY_ALL(TSE) > TPEx(OTC)
  const code = symbol.replace(/\.(TW|TWO)$/i, '');
  if (/\.(TW|TWO)$/i.test(symbol)) {
    if (_realtimeCache[code])   return _realtimeCache[code];    // MIS 即時（交易時段）
    if (_twsePriceCache[code])  return _twsePriceCache[code];   // TSE 昨日收盤
    if (_otcPriceCache[code])   return _otcPriceCache[code];    // OTC 上櫃
  }

  // Fallback：Yahoo Finance via proxy（用於國際股票或台股快取未命中）
  const url = CFG.yfChart + encodeURIComponent(symbol) + '?interval=1d&range=5d';
  try {
    const r = await proxyFetch(url);
    const d = JSON.parse(await r.text());
    const result = d.chart?.result?.[0];
    const meta   = result?.meta;
    if (!meta || !meta.regularMarketPrice) return null;
    const price = meta.regularMarketPrice;
    const prev  = meta.chartPreviousClose || meta.regularMarketPreviousClose || price;
    const chg   = price - prev;
    const pct   = prev ? (chg / prev) * 100 : 0;

    // 從 indicators 取各日成交量，計算量增減百分比
    const vols      = (result?.indicators?.quote?.[0]?.volume || []).filter(v => v != null && v > 0);
    const todayVol  = meta.regularMarketVolume || (vols[vols.length - 1] || 0);
    const prevVol   = vols.length >= 2 ? vols[vols.length - 2] : 0;
    const volChgPct = prevVol > 0 ? ((todayVol - prevVol) / prevVol) * 100 : null;

    return {
      symbol,
      regularMarketPrice: price,
      regularMarketChange: chg,
      regularMarketChangePercent: pct,
      regularMarketVolume: todayVol,
      prevVolume: prevVol,
      volChgPct,
      regularMarketTime: meta.regularMarketTime || 0,
      shortName: meta.shortName || meta.longName || symbol,
    };
  } catch (e) {
    console.warn('[YF]', symbol, e.message);
    return null;
  }
}

// 批次（並行）
async function yfQuotes(symbols) {
  const valid = symbols.filter(Boolean);
  if (!valid.length) return [];
  const results = await Promise.allSettled(valid.map(s => yfQuote(s)));
  return results.filter(r => r.status === 'fulfilled' && r.value).map(r => r.value);
}

// 指數 / 期貨專用：使用 meta 內建的 change/percent（最準確），不自行計算
async function yfQuoteIndex(symbol) {
  // 主介接 query1；備援自動切 query2（APIS.yf_chart）
  const suffix = encodeURIComponent(symbol) + '?interval=1d&range=2d';
  for (const base of [APIS.yf_chart.pri, APIS.yf_chart.bak].filter(Boolean)) {
    try {
      const r = await proxyFetch(base + suffix);
      const d = JSON.parse(await r.text());
      const result = d.chart?.result?.[0];
      const meta   = result?.meta;
      if (!meta || !meta.regularMarketPrice) continue;
      const price = meta.regularMarketPrice;
      const chg   = meta.regularMarketChange       ?? (price - (meta.chartPreviousClose || meta.regularMarketPreviousClose || price));
      const pct   = meta.regularMarketChangePercent ?? (meta.chartPreviousClose ? chg / meta.chartPreviousClose * 100 : 0);
      return {
        symbol,
        regularMarketPrice: price,
        regularMarketChange: chg,
        regularMarketChangePercent: pct,
        regularMarketVolume: meta.regularMarketVolume || 0,
        volChgPct: null,
        regularMarketTime: meta.regularMarketTime || 0,
        shortName: meta.shortName || meta.longName || symbol,
      };
    } catch (e) { console.warn('[YF-IDX]', symbol, base, e.message); }
  }
  return null;
}

// 輔助：解析台指期各來源欄位
function parseFutPrice(item) {
  const n = s => parseFloat(String(s || '0').replace(/,/g,'')) || 0;
  const price = n(item.ClosingPrice) || n(item.LastPrice) || n(item.Close) || n(item.TradePrice) || n(item.LS);
  const ref   = n(item.ReferencePrice) || n(item.PreviousClosingPrice) || n(item.RefPrice) || n(item.REF) || n(item.PreviousClose);
  const chg   = n(item.Change) || n(item.PriceChange) || n(item.CHG) || (price && ref ? price - ref : 0);
  const pct   = ref > 0 ? chg / ref * 100 : 0;
  const vol   = n(item.Volume) || n(item.TradingVolume) || n(item.TV) || n(item.TotalVolume);
  return price > 0 ? { price, ref, chg, pct, vol } : null;
}

// 台指期：TAIFEX OpenAPI → MIS API（日盤+夜盤）→ Yahoo 備援
async function fetchTaifex() {
  const mkResult = (parsed, label) => ({
    symbol: 'FITX=F',
    regularMarketPrice: parsed.price,
    regularMarketChange: parsed.chg,
    regularMarketChangePercent: parsed.pct,
    regularMarketVolume: parsed.vol,
    volChgPct: null,
    regularMarketTime: Math.floor(Date.now() / 1000),
    shortName: label,
  });

  // ① TAIFEX OpenData REST API（最穩定，含日/夜盤）
  const openApis = [
    { url: 'https://openapi.taifex.com.tw/v1/DailyFuturesQuotes?CommodityID=TXF', label: '台指期' },
    { url: 'https://openapi.taifex.com.tw/v1/NightFuturesQuotes?CommodityID=TXF',  label: '台指期（夜盤）' },
  ];
  for (const api of openApis) {
    try {
      const r = await proxyFetch(api.url);
      const rows = JSON.parse(await r.text());
      if (!Array.isArray(rows) || !rows.length) continue;
      const parsed = parseFutPrice(rows[rows.length - 1]);
      if (parsed) return mkResult(parsed, api.label);
    } catch (_) {}
  }

  // ② TAIFEX MIS API（日盤 MarketCode=0，夜盤 MarketCode=1，需 POST）
  for (const [mc, label] of [['0','台指期'],['1','台指期（夜盤）']]) {
    try {
      const r = await fetch('https://mis.taifex.com.tw/futures/api/getQuoteList', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ MarketCode: mc, CommodityID: 'TXF', RowCount: 10, PageNo: 1 }),
        signal: AbortSignal.timeout(8000),
      });
      if (!r.ok) continue;
      const d   = JSON.parse(await r.text());
      const list = (d.RtData || d.RtnData || d.Data || {}).QuoteList || [];
      const item = list.find(i => {
        const sid = i.SymbolID || i.CommodityId || i.CommodityID || '';
        return sid.startsWith('TXF') && sid.includes('-F');
      }) || list.find(i => (i.SymbolID||'').startsWith('TXF'));
      if (!item) continue;
      const parsed = parseFutPrice({
        ClosingPrice: item.CLastPrice || item.SettlementPrice,
        ReferencePrice: item.CRefPrice,
        Change: item.CDiff,
        Volume: item.CTotalVolume,
      });
      if (parsed) return mkResult(parsed, label);
    } catch (_) {}
  }

  // ③ Yahoo Finance 備援
  for (const sym of ['TXF1=F', 'FITX=F', 'TWF=F']) {
    const q = await yfQuoteIndex(sym);
    if (q && q.regularMarketPrice) { q.symbol = 'FITX=F'; return q; }
  }
  return null;
}

const _SS_TPEX = 'smtm_tpex_last';
async function fetchTpexIndex() {
  const mkQ = (price, chg, pct) => {
    const q = { symbol: '^TPEX', regularMarketPrice: price,
      regularMarketChange: chg, regularMarketChangePercent: pct,
      regularMarketVolume: 0, volChgPct: null,
      regularMarketTime: Math.floor(Date.now() / 1000), shortName: '櫃買指數' };
    try { sessionStorage.setItem(_SS_TPEX, JSON.stringify(q)); } catch(_) {}
    return q;
  };

  // ① TWSE MIS API（otc_OTC01.tw）— 交易時段即時
  try {
    const url = 'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=otc_OTC01.tw&json=1&delay=0';
    const r = await proxyFetch(url);
    const d = JSON.parse(await r.text());
    const m = (d.msgArray || [])[0];
    if (m) {
      const price = parseFloat((m.z && m.z !== '-') ? m.z : 0);
      const prev  = parseFloat((m.y && m.y !== '-') ? m.y : 0);
      if (price > 0 && prev > 0) return mkQ(price, price - prev, (price - prev) / prev * 100);
      if (price > 0) return mkQ(price, 0, 0);
    }
  } catch (_) {}

  // ② info.tpex.org.tw/api/mktRT — 含收盤後仍正確的當日 OTC 指數
  try {
    const r = await proxyFetch('https://info.tpex.org.tw/api/mktRT');
    const d = JSON.parse(await r.text());
    const t = d.taiex;          // 'taiex' key 實際存放 OTC 指數
    if (t && parseFloat(t.index) > 50) {
      const price = parseFloat(t.index);
      const diff  = parseFloat(t.diff)    || 0;
      const pct   = parseFloat(t.percent) || 0;
      return mkQ(price, diff, pct);
    }
  } catch (_) {}

  // ③ 上次已知值（session storage）
  try {
    const saved = JSON.parse(sessionStorage.getItem(_SS_TPEX) || 'null');
    if (saved?.regularMarketPrice) return saved;
  } catch (_) {}

  return null;
}

// ==================== TAIFEX DailyMarketReportFut 共用快取 ====================
// 端點：https://openapi.taifex.com.tw/v1/DailyMarketReportFut（不帶 query param）
// 含當日日盤（TradingSession=一般）與夜盤（盤後）所有期貨合約資料
// cors.lol / codetabs 均可取得；帶 ?CommodityID= 會觸發 302 → Swagger HTML
const _txDailyCache = { ts: 0, day: null, night: null };
const TX_DAILY_TTL  = 5 * 60 * 1000;
let   _txDailyProm  = null;   // 去重：同時多次呼叫只發一個 request

async function _fetchTxDailyData() {
  // 1. 快取命中
  if (_txDailyCache.day !== undefined && Date.now() - _txDailyCache.ts < TX_DAILY_TTL
      && _txDailyCache.ts > 0) return _txDailyCache;

  // 2. 若已有進行中的 Promise，等待同一個
  if (_txDailyProm) return _txDailyProm;

  _txDailyProm = (async () => {
    try {
      // 不帶 query param —— proxy 可正常轉發；帶參數會被 302 到 Swagger HTML
      const r    = await proxyFetch('https://openapi.taifex.com.tw/v1/DailyMarketReportFut');
      const rows = JSON.parse(await r.text());
      if (!Array.isArray(rows) || !rows.length) throw new Error('empty');

      const n = s => parseFloat(String(s || '0').replace(/,/g, '')) || 0;

      // 篩出台指期（Contract = 'TX'），依交易時段分組，取成交量最大（近月）
      const tx    = rows.filter(row => row.Contract === 'TX');
      const byVol = (a, b) => n(b.Volume) - n(a.Volume);
      const dayR  = tx.filter(row => row.TradingSession === '一般').sort(byVol)[0];
      const ngtR  = tx.filter(row => row.TradingSession === '盤後').sort(byVol)[0];

      const parse = row => {
        if (!row) return null;
        const price = n(row.Last);
        const chg   = n(row.Change);
        // '%' 欄位格式如 "1.84%" 或 "-0.10%"
        const pct   = parseFloat((row['%'] || '0').replace('%', '')) || (price && chg ? chg / (price - chg) * 100 : 0);
        const vol   = n(row.Volume);
        return price > 0 ? { price, chg, pct, vol } : null;
      };

      _txDailyCache.day   = parse(dayR);
      _txDailyCache.night = parse(ngtR);
      _txDailyCache.ts    = Date.now();
    } catch (_) {
      // 保留舊快取，僅更新時間戳以避免短期內重複打
      if (!_txDailyCache.ts) _txDailyCache.ts = Date.now() - TX_DAILY_TTL + 30000;
    }
    _txDailyProm = null;
    return _txDailyCache;
  })();

  return _txDailyProm;
}

// ==================== 台指近月（TXF）====================
const _SS_TXF = 'smtm_txf_last';
async function fetchTxfNear() {
  const mkQ = (p, shortName = '台指近月') => {
    const q = { symbol: 'TXF', regularMarketPrice: p.price,
      regularMarketChange: p.chg, regularMarketChangePercent: p.pct,
      regularMarketVolume: p.vol || 0, volChgPct: null,
      regularMarketTime: Math.floor(Date.now() / 1000), shortName };
    try { sessionStorage.setItem(_SS_TXF, JSON.stringify(q)); } catch(_) {}
    return q;
  };

  // ① TWSE MIS（tse_TXFR1.tw）— 交易時段即時，盤後欄位為 "-"
  try {
    const url = 'https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_TXFR1.tw&json=1&delay=0';
    const r = await proxyFetch(url);
    const d = JSON.parse(await r.text());
    const m = (d.msgArray || [])[0];
    if (m) {
      const zOk  = m.z  && m.z  !== '-';
      const pzOk = m.pz && m.pz !== '-';
      const yOk  = m.y  && m.y  !== '-';
      const price = parseFloat(zOk ? m.z : pzOk ? m.pz : yOk ? m.y : 0);
      const prev  = parseFloat(yOk ? m.y : 0);
      if (price > 0) {
        const chg = (zOk || pzOk) && prev > 0 ? price - prev : 0;
        const pct = (zOk || pzOk) && prev > 0 ? chg / prev * 100 : 0;
        return mkQ({ price, chg, pct, vol: parseFloat(m.v || 0) });
      }
    }
  } catch (_) {}

  // ② TAIFEX OpenAPI DailyMarketReportFut（日盤近月，最後交易日收盤參考）
  try {
    const cache = await _fetchTxDailyData();
    if (cache.day?.price > 0) return mkQ(cache.day, '台指近月（參考）');
  } catch (_) {}

  // ③ 上次已知值（session storage）
  try {
    const saved = JSON.parse(sessionStorage.getItem(_SS_TXF) || 'null');
    if (saved?.regularMarketPrice) return saved;
  } catch (_) {}

  return null;
}

// ==================== MARKET INDICES ====================
// 國際指數 session 快取（8 分鐘 TTL），避免每次 refresh 都打 proxy
const _intlCache = {};
const INTL_TTL   = 8 * 60 * 1000;

async function yfQuoteIndexCached(symbol) {
  const now = Date.now();
  const hit = _intlCache[symbol];
  if (hit && now - hit.ts < INTL_TTL) return hit.data;
  const q = await yfQuoteIndex(symbol);
  if (q) _intlCache[symbol] = { data: q, ts: now };
  return q;
}

// _mktsQm 為全域，讓每次 render 都從同一個物件累積
const _mktsQm = {};

function _renderMarkets(tpex, txf, txfNight) {
  if (tpex)     _mktsQm['^TPEX'] = tpex;
  if (txf)      _mktsQm['TXF']   = txf;
  if (txfNight) _mktsQm['TXFN']  = txfNight;
  // 用 _intlCache 補回所有已知資料（防止 local qm 遺漏）
  ['^TWII','^N225','^KS11','^DJI','^GSPC','^IXIC'].forEach(s => {
    if (_intlCache[s]?.data && !_mktsQm[_intlCache[s].data.symbol]) {
      _mktsQm[_intlCache[s].data.symbol] = _intlCache[s].data;
    }
  });
  renderTW(_mktsQm);
  renderIntl(_mktsQm);
}

async function fetchMarkets() {
  const intSyms = ['^TWII', '^N225', '^KS11', '^DJI', '^GSPC', '^IXIC'];
  const delay   = ms => new Promise(r => setTimeout(r, ms));

  // 有快取先渲染
  intSyms.forEach(s => { if (_intlCache[s]?.data) _mktsQm[_intlCache[s].data.symbol] = _intlCache[s].data; });
  if (Object.keys(_mktsQm).length) { renderTW(_mktsQm); renderIntl(_mktsQm); }

  // 各指數 250ms 錯開，每拿到一個立即更新 _mktsQm 並 render
  const idxPromises = intSyms.map((s, i) =>
    delay(i * 250)
      .then(() => yfQuoteIndexCached(s))
      .then(q => { if (q) { _mktsQm[q.symbol] = q; renderTW(_mktsQm); renderIntl(_mktsQm); } })
      .catch(() => {})
  );

  // TPEx / TXF 日盤 / TXF 夜盤 / 三大法人 並行
  const [tpex, txf, txfNight] = await Promise.all([
    fetchTpexIndex(),
    fetchTxfNear(),
    fetchTxfNight(),
    fetchInstitutional(),
    ...idxPromises,
  ]);

  _renderMarkets(tpex, txf, txfNight);

  // 失敗的指數 5 秒後重試一次（rate limit 釋放後）
  const failed = intSyms.filter(s => !_intlCache[s]);
  if (failed.length) {
    delay(5000).then(async () => {
      await Promise.allSettled(failed.map(s => yfQuoteIndexCached(s).then(q => {
        if (q) { _mktsQm[q.symbol] = q; }
      })));
      _renderMarkets(null, null, null);
    });
  }
}

// ==================== 三大法人買賣超 ====================
// BFI82U 欄位格式（實測）：[[類別, 買進金額, 賣出金額, 買賣差額], ...]
// 單位：元（不是千元）。 元÷1e8 = 億
// 實際類別名稱：自營商(自行買賣)、自營商(避險)、自營商、投信、
//               外資及陸資(不含外資自營商)、外資自營商、外資及陸資、三大法人
async function fetchInstitutional() {
  const el = id('instContent');
  if (!el) return;

  try {
    // BFI82U has CORS — fetch directly (no proxy needed)
    const url = 'https://www.twse.com.tw/rwd/zh/fund/BFI82U?type=day&response=json';
    let d;
    try {
      const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
      d = JSON.parse(await r.text());
    } catch (_) {
      const r = await proxyFetch(url);
      d = JSON.parse(await r.text());
    }
    const rows = d.data || [];
    if (!rows.length) throw new Error('BFI82U empty');

    const n = s => parseFloat(String(s||'0').replace(/,/g,'')) || 0;
    const date = d.date ? `${d.date.slice(0,4)}/${d.date.slice(4,6)}/${d.date.slice(6,8)}` : '';

    // BFI82U 實際回傳格式（2026年）：
    //   自營商(自行買賣), 自營商(避險), 投信,
    //   外資及陸資(不含外資自營商), 外資自營商, 合計
    // 規則：合計自營商子項；「合計」列 = 三大合計
    const rowMap = {};
    rows.forEach(row => {
      const cat = (row[0] || '').trim();
      const net = n(row[3]);
      if (cat === '合計') {
        rowMap['三大合計'] = net;
      } else if (cat === '投信') {
        rowMap['投信'] = net;
      } else if (cat === '外資及陸資' || cat.startsWith('外資及陸資(')) {
        // 優先用「外資及陸資」合計，其次用「不含外資自營商」
        if (!('外資' in rowMap) || cat === '外資及陸資') rowMap['外資'] = net;
      } else if (cat.startsWith('自營商')) {
        // 累加所有自營商子項（自行買賣 + 避險）
        rowMap['自營商'] = (rowMap['自營商'] || 0) + net;
      }
    });

    const totalFound = Object.keys(rowMap).length;
    if (!totalFound) throw new Error('no matching rows');

    const ORDER = ['外資', '投信', '自營商', '三大合計'];
    let html = `<div class="inst-hd"><i class="fa-solid fa-building-columns" style="color:var(--warn)"></i> 三大法人買賣超（億元）${date ? `<span style="font-weight:400;color:var(--text3);margin-left:.5rem">${date}</span>` : ''}</div>`;
    ORDER.forEach(label => {
      if (!(label in rowMap)) return;
      const net  = rowMap[label];
      const netB = (net / 1e8).toFixed(2);
      const dir  = net > 0 ? 'up' : net < 0 ? 'down' : 'neu';
      const arr  = net > 0 ? '▲' : net < 0 ? '▼' : '─';
      const isT  = label === '三大合計';
      html += `<div class="inst-row">
        <span class="inst-label ${isT ? 'inst-total' : ''}">${label}</span>
        <span class="inst-val ${dir} ${isT ? 'inst-total' : ''}">${arr} ${Math.abs(parseFloat(netB)).toFixed(2)} 億</span>
      </div>`;
    });

    // 大盤成交值 — FMTQIK 有 CORS，直接取；欄位格式：[日期,成交股數,成交金額,成交筆數,發行量,漲跌]
    try {
      const fmUrl = 'https://www.twse.com.tw/rwd/zh/afterTrading/FMTQIK?response=json';
      let d2;
      try {
        const r2 = await fetch(fmUrl, { signal: AbortSignal.timeout(8000) });
        d2 = JSON.parse(await r2.text());
      } catch (_) {
        const r2 = await proxyFetch(fmUrl);
        d2 = JSON.parse(await r2.text());
      }
      const rows2 = d2.data || [];
      if (rows2.length) {
        const last = rows2[rows2.length - 1];
        // row: [民國日期, 成交股數, 成交金額, 成交筆數, 發行量加權指數, 漲跌點數]
        const dateRaw = last[0] || '';
        const volRaw  = last[1] || '';
        const valRaw  = last[2] || '';
        const n2 = s => parseFloat(String(s||'0').replace(/,/g,'')) || 0;
        const val = n2(valRaw), vol = n2(volRaw);
        if (val) {
          const valB = (val / 1e8).toFixed(0);
          html += `<div class="inst-hd"><i class="fa-solid fa-coins" style="color:var(--blue)"></i> 大盤成交（${dateRaw}）</div>`;
          html += `<div class="mkt-vol-row"><span class="inst-label">成交值</span><span class="inst-val" style="color:var(--blue)">${valB} 億元</span></div>`;
          if (vol) html += `<div class="mkt-vol-row"><span class="inst-label">成交量</span><span class="inst-val">${fmtVol(vol)} 股</span></div>`;
        }
      }
    } catch (_) {}

    setHtml(el, html)
  } catch (e) {
    console.warn('[Inst]', e.message);
    setHtml(el, `<div class="inst-hd" style="color:var(--text3)"><i class="fa-solid fa-circle-exclamation"></i> 三大法人資料暫無法取得</div>`)
  }
}

// ==================== 中文股名 + 上市/上櫃股價快取 ====================
const _twseNameCache  = {};   // code → 中文名
const _twsePriceCache = {};   // code → quote object（STOCK_DAY_ALL 昨日收盤，直接 CORS）
const _otcPriceCache  = {};   // code → quote object（TPEx openapi，一次 proxy 拉全部）
const _realtimeCache  = {};   // code → quote object（MIS 即時，交易時段優先）
const _otcSet = new Set();   // 已確認為上櫃的代號

// 台股交易時間：週一–五 09:00–13:30（台灣時間 UTC+8）
function isTradingHours() {
  const tw  = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
  const day = tw.getDay();
  if (day === 0 || day === 6) return false;
  const mins = tw.getHours() * 60 + tw.getMinutes();
  return mins >= 9 * 60 && mins < 13 * 60 + 30;
}

// TWSE MIS 即時報價（一次 proxy 批次取全部自選股，交易時段使用）
async function fetchMisRealtime(codes) {
  if (!codes.length) return;
  // 依已知分類決定 ex_ 前綴；未知的先試 tse_
  const mk1 = codes.filter(c => !_otcSet.has(c)).map(c => `tse_${c}.tw`).join('|');
  const mk2 = codes.filter(c =>  _otcSet.has(c)).map(c => `otc_${c}.tw`).join('|');
  const exCh = [mk1, mk2].filter(Boolean).join('|');
  if (!exCh) return;

  const parseItems = (items) => {
    items.forEach(item => {
      const code = item.c;
      if (!code) return;
      // z = 最新成交；"-" 表示尚無成交，改用 y（昨收）
      const priceStr = (item.z && item.z !== '-') ? item.z : item.y;
      const price = parseFloat(priceStr) || 0;
      if (!price) return;
      const prev = parseFloat(item.y) || price;
      const chg  = price - prev;
      const pct  = prev > 0 ? chg / prev * 100 : 0;
      const vol  = parseFloat(item.v) || 0;
      if (item.n && !_twseNameCache[code]) _twseNameCache[code] = item.n;
      if (item.ex === 'otc') _otcSet.add(code);
      _realtimeCache[code] = {
        symbol: code + (item.ex === 'otc' ? '.TWO' : '.TW'),
        shortName: item.n || code,
        regularMarketPrice:         price,
        regularMarketChange:        chg,
        regularMarketChangePercent: pct,
        regularMarketVolume:        vol,
        _realtime: true,
      };
    });
  };

  try {
    const url = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${encodeURIComponent(exCh)}&json=1&delay=0`;
    const r   = await proxyFetch(url);
    const d   = JSON.parse(await r.text());
    parseItems(d.msgArray || []);
  } catch (e) { console.warn('[MIS realtime]', e.message); }

  // 補查 tse_ 查不到的（可能是 OTC）
  const missed = codes.filter(c => !_realtimeCache[c] && !_otcSet.has(c));
  if (missed.length) {
    try {
      const url2 = `https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${encodeURIComponent(missed.map(c => `otc_${c}.tw`).join('|'))}&json=1&delay=0`;
      const r2   = await proxyFetch(url2);
      const d2   = JSON.parse(await r2.text());
      parseItems(d2.msgArray || []);
    } catch (_) {}
  }
}

function parseName(row) {
  return row.Name || row.StockName || row.CompanyName ||
         row['名稱'] || row['股票名稱'] || row['公司名稱'] ||
         row.SecuritiesCompanyName || row.Abb || '';
}

// 一次批次拉 TPEx 全部上櫃報價，建立名稱 + 股價快取
let _tpexLoaded = false;
async function loadTpexAll() {
  if (_tpexLoaded) return;
  try {
    const r = await proxyFetch('https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes');
    const rows = JSON.parse(await r.text());
    if (!Array.isArray(rows) || !rows.length) return;
    _tpexLoaded = true;
    rows.forEach(row => {
      const code = String(row.SecuritiesCompanyCode || row.Code || row['代號'] || '').trim();
      if (!code) return;
      _otcSet.add(code);
      // 中文名
      if (!_twseNameCache[code]) {
        const name = parseName(row);
        if (name) _twseNameCache[code] = name;
      }
      // 股價：Close(收盤) or LastTrade
      const n = s => parseFloat(String(s||'0').replace(/,/g,'')) || 0;
      const price = n(row.Close) || n(row.ClosingPrice) || n(row.LastTrade) || n(row.TradePrice);
      if (!price) return;
      const prev  = n(row.PreviousClose) || n(row.YesterdayClosePrice) || n(row.OpeningPrice);
      const chgR  = n(row.Change) || n(row.PriceChange);
      const chg   = chgR || (prev ? price - prev : 0);
      const pct   = prev > 0 ? chg / prev * 100 : 0;
      const vol   = n(row.TradeVolume) || n(row.Volume) || n(row.TradingVolume);
      _otcPriceCache[code] = {
        symbol: code,
        regularMarketPrice: price,
        regularMarketChange: chg,
        regularMarketChangePercent: pct,
        regularMarketVolume: vol,
        volChgPct: null,
        regularMarketTime: Math.floor(Date.now() / 1000),
        shortName: _twseNameCache[code] || code,
      };
    });
  } catch (e) { console.warn('[TPEx all]', e.message); }
}

// 批次載入 TWSE 上市公司名稱（優先使用有 CORS 的 RWD 端點，無需 proxy）
let _twseListLoaded = false;
async function loadTwseList() {
  if (_twseListLoaded) return;

  // ① 優先：APIS.stock_list.pri（CORS 直連，無需 proxy）
  //    回傳格式：{ stat, fields:[證券代號,證券名稱,...], data:[["0050","元大台灣50",...]] }
  try {
    const r = await fetch(APIS.stock_list.pri, { signal: AbortSignal.timeout(8000) });
    const d = JSON.parse(await r.text());
    const rows = d.data || [];
    if (Array.isArray(rows) && rows.length) {
      let filled = 0;
      rows.forEach(row => {
        const code = String(row[0] || '').trim();
        const name = String(row[1] || '').trim();
        if (!code || !name) return;
        if (!_twseNameCache[code]) _twseNameCache[code] = name;
        filled++;
        // 同時建立收盤價快取（row: code,name,vol,value,open,high,low,close,change,txns）
        const n = s => parseFloat(String(s || '').replace(/,/g, '')) || 0;
        const close  = n(row[7]);
        const change = n(row[8]);
        // ETF 可能某日零成交 → close=0，改用 open/high/low 其一，或昨收估算
        const price = close > 0 ? close : (n(row[4]) || n(row[5]) || n(row[6]) || 0);
        if (price > 0) {
          const prev = price - change;
          _twsePriceCache[code] = {
            symbol: code + '.TW',
            shortName: name,
            regularMarketPrice:         price,
            regularMarketChange:        change,
            regularMarketChangePercent: prev > 0 ? change / prev * 100 : 0,
            regularMarketVolume:        n(row[2]) / 1000, // 張
          };
        }
      });
      if (filled > 0) { _twseListLoaded = true; return; }
    }
  } catch (e) { console.warn('[TWSE list RWD]', e.message); }

  // ② 備用：openapi 端點（需 proxy）
  const apis = [
    'https://openapi.twse.com.tw/v1/opendata/t187ap03_L',
    'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL',
  ];
  for (const apiUrl of apis) {
    try {
      const r = await proxyFetch(apiUrl);
      const rows = JSON.parse(await r.text());
      if (!Array.isArray(rows) || !rows.length) continue;
      let filled = 0;
      rows.forEach(row => {
        const code = String(
          row['公司代號'] || row['Code'] || row['StockNo'] || row['股票代號'] || ''
        ).trim();
        const name =
          row['公司簡稱'] || row['公司名稱'] || row['公司全名'] ||
          row['股票名稱'] || row['Name'] || row['StockName'] || parseName(row);
        if (code && name && !_twseNameCache[code]) {
          _twseNameCache[code] = name;
          filled++;
        }
      });
      if (filled > 0) { _twseListLoaded = true; return; }
    } catch (e) { console.warn('[TWSE list]', apiUrl, e.message); }
  }
}

async function fetchTwseNames(stocks) {
  const toFetch = stocks.filter(s => s && !_twseNameCache[s]);
  if (!toFetch.length) return;

  // ① 批次載入 TWSE 上市名稱（含全部上市股，一次解決）
  await loadTwseList();

  // ② 仍缺的（可能是上櫃）→ 嘗試 STOCK_DAY 逐一查（CORS-enabled RWD 端點）
  const stillMissing = toFetch.filter(s => !_twseNameCache[s]);
  const needOtc = [];
  if (stillMissing.length) {
    await Promise.allSettled(stillMissing.map(async s => {
      try {
        // www.twse.com.tw/rwd 有 CORS，直接取；回傳 { stat, fields, data:[array] }
        const url = `https://www.twse.com.tw/rwd/zh/afterTrading/STOCK_DAY?stockNo=${s}&response=json`;
        const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
        const d = JSON.parse(await r.text());
        const rows = d.data || [];
        if (rows.length) {
          // title 格式：「115年04月 2330 台積電           各日成交資訊」
          const title = d.title || '';
          const m = title.match(/\d{4}\s+(\S[\S\s]*?)\s{2,}各日成交資訊/);
          const name = m ? m[1].trim() : '';
          if (name) { _twseNameCache[s] = name; return; }
        }
      } catch (_) {}
      // Fallback: try openapi with proxy
      try {
        const url2 = `https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY?stockNo=${s}`;
        const r2 = await proxyFetch(url2);
        const rows2 = JSON.parse(await r2.text());
        if (Array.isArray(rows2) && rows2.length) {
          const name = parseName(rows2[0]);
          if (name) { _twseNameCache[s] = name; return; }
        }
      } catch (_) {}
      needOtc.push(s); // TWSE 都查不到 → 判定為上櫃
    }));
  }

  // ③ 上櫃：TPEx 批次（含名稱 + 股價）
  if (needOtc.length) {
    needOtc.forEach(s => _otcSet.add(s));
    await loadTpexAll();
  }
}

function _renderPortHtml() {
  const qm = {};
  portfolio.filter(Boolean).forEach(s => {
    qm[s] = _realtimeCache[s] || _twsePriceCache[s] || _otcPriceCache[s] || null;
  });

  return portfolio.map((stock, i) => {
    if (!stock) return `
      <div class="stock-card js-open-modal" title="點擊新增">
        <div class="s-code" style="color:var(--text3)">${i+1}. 未設定</div>
        <div class="s-name" style="font-size:.65rem;color:var(--text3)">點擊新增</div>
        <div class="s-price neu" style="font-size:1.2rem;margin-top:.4rem">+</div>
      </div>`;
    const q = qm[stock];
    if (!q) return `
      <div class="stock-card">
        <div class="s-code">${esc(stock)}</div>
        <div class="s-name" style="color:var(--text3);font-size:.72rem">查詢中…</div>
        <div class="s-price neu">--</div>
      </div>`;
    const ch  = q.regularMarketChange || 0;
    const pct = q.regularMarketChangePercent || 0;
    const dir = ch > 0 ? 'up' : ch < 0 ? 'down' : 'neu';
    const arr = ch > 0 ? '▲' : ch < 0 ? '▼' : '─';
    const cls = ch > 0 ? 'up-card' : ch < 0 ? 'down-card' : '';
    const cnName = _twseNameCache[stock] || (q.shortName && !/^\d/.test(q.shortName) ? q.shortName : null) || stock;
    let volChgHtml = '';
    if (q.volChgPct != null) {
      const vd = q.volChgPct > 0 ? 'up' : q.volChgPct < 0 ? 'down' : 'neu';
      const va = q.volChgPct > 0 ? '▲' : q.volChgPct < 0 ? '▼' : '─';
      volChgHtml = `<span class="${vd}" style="font-size:.62rem;margin-left:.3rem">${va}${Math.abs(q.volChgPct).toFixed(1)}%</span>`;
    }
    const rtBadge = q._realtime ? '<span style="font-size:.55rem;color:var(--blue);margin-left:.3rem">即時</span>' : '';
    return `
      <div class="stock-card ${cls}">
        <div class="s-code">${esc(stock)}${rtBadge}</div>
        <div class="s-name" title="${esc(cnName)}">${esc(cnName)}</div>
        <div class="s-price ${dir}">${fmtN(q.regularMarketPrice, 2)}</div>
        <div class="s-chg ${dir}">${arr} ${Math.abs(ch).toFixed(2)} (${pct>0?'+':''}${pct.toFixed(2)}%)</div>
        <div class="s-vol">量 ${fmtVol(q.regularMarketVolume)}${volChgHtml}</div>
      </div>`;
  }).join('');
}

async function fetchPortfolio() {
  const el = id('portGrid');
  const valid = portfolio.filter(Boolean);
  if (!valid.length) {
    setHtml(el, '<p style="grid-column:1/-1;text-align:center;color:var(--text3);padding:1.5rem;font-size:.78rem">點擊「編輯」新增自選股</p>');
    return;
  }

  // ① 有 sessionStorage cache 先立刻顯示（不出現 loading）
  const CACHE_KEY = 'smtm_port_cache';
  const cached = sessionStorage.getItem(CACHE_KEY);
  if (cached) {
    setHtml(el, cached);
  } else {
    // 首次載入：用已有快取先渲染骨架（無 spinner）
    el.classList.remove('loading');
    el.innerHTML = _renderPortHtml();
  }

  // ② 載入基礎名稱 + 昨日收盤快取（TSE zero-proxy, OTC one-proxy）
  await fetchTwseNames(valid);

  // ③ 交易時間 → MIS 即時報價覆蓋快取
  if (isTradingHours()) {
    await fetchMisRealtime(valid);
  }

  // ④ 仍缺資料者 → Yahoo Finance proxy 補查（.TW 先，再 .TWO）
  const stillMissing = valid.filter(s => !_realtimeCache[s] && !_twsePriceCache[s] && !_otcPriceCache[s]);
  if (stillMissing.length) {
    const fb1 = await yfQuotes(stillMissing.map(s => s + '.TW'));
    fb1.forEach(q => {
      const code = q.symbol.replace(/\.TW$/, '');
      _twsePriceCache[code] = q;
    });
    const miss2 = stillMissing.filter(s => !_twsePriceCache[s]);
    if (miss2.length) {
      const fb2 = await yfQuotes(miss2.map(s => s + '.TWO'));
      fb2.forEach(q => {
        const code = q.symbol.replace(/\.TWO$/, '');
        _otcPriceCache[code] = q;
        _otcSet.add(code);
      });
    }
  }

  // ⑤ 渲染並存 cache
  const newHtml = _renderPortHtml();
  setHtml(el, newHtml);
  sessionStorage.setItem(CACHE_KEY, newHtml);
}

// Google News RSS 已被各 proxy 封鎖（回傳 Google "Sorry..." HTML）
// 改用 Yahoo Finance /v1/finance/search，回傳 JSON，proxy 可正常傳遞
async function _yfNewsSearch(query, count = 5) {
  // 主介接 query1；備援自動切 query2（APIS.yf_search）
  const params = `${encodeURIComponent(query)}&lang=zh-TW&region=TW&quotesCount=0&newsCount=${count}&enableFuzzyQuery=false`;
  for (const base of [APIS.yf_search.pri, APIS.yf_search.bak].filter(Boolean)) {
    try {
      const r = await proxyFetch(base + params);
      const d = JSON.parse(await r.text());
      const items = (d.news || []).map(n => ({
        title:     n.title || '',
        link:      n.link  || '',
        publisher: n.publisher || '',
        _ts:       (n.providerPublishTime || 0) * 1000,
      })).filter(n => n.title && n.link);
      if (items.length) return items;
    } catch (_) {}
  }
  return [];
}

async function fetchPortNews() {
  const el = id('portNews');
  const valid = portfolio.filter(Boolean);

  if (!valid.length) {
    setHtml(el, '<p style="text-align:center;color:var(--text3);font-size:.78rem;padding:1rem">請先設定自選股</p>');
    return;
  }

  // ① 網頁載入：立即先顯示資料庫快取
  let hasCached = false;
  try {
    const stored = JSON.parse(localStorage.getItem('smtm_port_news_db') || 'null');
    if (stored?.html) {
      setHtml(el, stored.html +
        '<p style="font-size:.65rem;color:var(--text3);text-align:center;margin-top:.4rem">（資料庫快取 · ' + fmtTs(stored.ts) + '）</p>');
      if (id('pnTs')) id('pnTs').textContent = fmtTs(stored.ts);
      hasCached = true;
    }
  } catch (_) {}

  if (!hasCached) {
    setHtml(el, '<div class="loading"><i class="fa-solid fa-circle-notch"></i> 載入中...</div>');
  }

  // ② 取中文名稱（限 5s，不阻塞主流程）
  await Promise.race([
    fetchTwseNames(valid).catch(() => {}),
    new Promise(r => setTimeout(r, 5000))
  ]);

  const stocks10 = valid.slice(0, 10);

  // ③ 主接口：UDN RSS + 關鍵字過濾（股票代號或中文名稱出現在標題中）
  let allItems = [];
  const rssResults = await Promise.allSettled([
    _fetchRssFeed(APIS.udn_fin.pri),
    _fetchRssFeed(APIS.udn_fin.bak),
  ]);
  const rssPool = [];
  rssResults.forEach(r => { if (r.status === 'fulfilled') rssPool.push(...r.value); });

  for (const item of rssPool) {
    const hay = (item.title + ' ' + item.description).toLowerCase();
    for (const stock of stocks10) {
      const cn = (_twseNameCache[stock] || '').toLowerCase();
      if (hay.includes(stock.toLowerCase()) || (cn && hay.includes(cn))) {
        allItems.push({ ...item, _ticker: stock, _name: _twseNameCache[stock] || stock, _ts: item.ts });
        break;
      }
    }
  }
  console.info('[PortNews] RSS 篩出', allItems.length, '筆');

  // ④ 備援接口：Yahoo Finance Search（RSS 結果不足 3 筆時啟用）
  if (allItems.length < 3) {
    const withTout = (p, ms = 12000) =>
      Promise.race([p, new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))]);
    const _fetchAllYF = async (baseUrl) => {
      const jobs = stocks10.map(async stock => {
        const cnName = _twseNameCache[stock] || '';
        const params = `${encodeURIComponent(stock + '.TW')}&lang=zh-TW&region=TW&quotesCount=0&newsCount=3&enableFuzzyQuery=false`;
        try {
          const r = await proxyFetch(baseUrl + params);
          const d = JSON.parse(await r.text());
          return (d.news || [])
            .map(n => ({ title: n.title||'', link: n.link||'', publisher: n.publisher||'',
                          ts: (n.providerPublishTime||0)*1000, _ts: (n.providerPublishTime||0)*1000,
                          _ticker: stock, _name: cnName||stock }))
            .filter(n => n.title && n.link);
        } catch (_) { return []; }
      });
      const res = await Promise.allSettled(jobs);
      const all = [];
      res.forEach(r => { if (r.status === 'fulfilled') all.push(...r.value); });
      return all;
    };
    try {
      const yfItems = await withTout(_fetchAllYF(APIS.yf_search.pri));
      if (yfItems.length) { allItems.push(...yfItems); console.info('[PortNews] YF 主接口補充', yfItems.length, '筆'); }
    } catch (_) {}
    if (allItems.length < 3 && APIS.yf_search.bak) {
      try {
        const yfItems2 = await withTout(_fetchAllYF(APIS.yf_search.bak));
        if (yfItems2.length) { allItems.push(...yfItems2); console.info('[PortNews] YF 備援接口補充', yfItems2.length, '筆'); }
      } catch (_) {}
    }
  }

  // ⑤ 去重、排序、取 top 10
  const seen = new Set();
  const top = allItems
    .filter(n => { if (!n.title || seen.has(n.title)) return false; seen.add(n.title); return true; })
    .sort((a, b) => (b.ts || b._ts || 0) - (a.ts || a._ts || 0))
    .slice(0, 10);

  if (!top.length) {
    if (!hasCached) {
      setHtml(el, `<div class="err"><i class="fa-solid fa-triangle-exclamation"></i> 暫無相關新聞<br><small style="color:var(--text3)">請確認自選股已設定</small></div>`);
    }
    return;
  }

  // ⑥ 渲染並存入資料庫
  const html = top.map(n => `
    <div class="pn-item">
      <a href="${n.link}" target="_blank" rel="noopener">
        <div class="pn-title">${esc(n.title)}</div>
      </a>
      <div class="pn-meta">
        <span class="tag tag-ticker">${esc(n._ticker)}${n._name && n._name !== n._ticker ? ' ' + esc(n._name) : ''}</span>
        ${n.publisher ? `<span class="ntime">${esc(n.publisher)}</span>` : ''}
        <span class="ntime">${(n.ts||n._ts) ? ago(n.ts||n._ts) : ''}</span>
      </div>
    </div>`).join('');

  try { localStorage.setItem('smtm_port_news_db', JSON.stringify({ html, ts: Date.now() })); } catch (_) {}
  setHtml(el, html);
  if (id('pnTs')) id('pnTs').textContent = fmtTs(Date.now());
}

  ];

  const now   = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const yest  = new Date(today); yest.setDate(yest.getDate() - 1);
  const end   = new Date(today); end.setDate(end.getDate() + 7);

  // 轉換日期字串為 Date
  const toDate = s => { const [y,m,d] = s.split('-').map(Number); return new Date(y,m-1,d); };

  const inRange = EVS
    .map(e => ({ ...e, _date: toDate(e.d) }))
    .filter(e => e._date >= yest && e._date <= end)
    .sort((a,b) => a._date - b._date);

  if (!inRange.length) {
    setHtml(el, '<p class="fin-empty">本週無重大財經事件</p>')
    return;

  const isYest  = d => d.getTime() === yest.getTime();

  // 按天分組

  inRange.forEach(e => {
    const k = e.d;
    if (!groups[k]) groups[k] = { date: e._date, events: [] };
    groups[k].events.push(e);
  });

  const dotCls = { fed:'ev-fed', cbc:'ev-cbc', data:'ev-data', earn:'ev-earn', mkt:'ev-mkt' };

  setHtml(el, Object.values(groups).map(g => {
    const lbl = isToday(g.date) ? '📌 今天 ' + dayFmt(g.date)
              : isYest(g.date)  ? '⏮ 昨天 ' + dayFmt(g.date)
              : '📅 ' + dayFmt(g.date);
    const dayCls = isToday(g.date) ? 'fin-day fin-day-today' : 'fin-day';
    const evHtml = g.events.map(e => `
      <div class="fin-event ev-imp-${e.imp||'normal'}">
        <div class="ev-dot ${dotCls[e.cat]||'ev-data'}"></div>
        <div>
          <a href="${e.url}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit">
            <div class="ev-name">${esc(e.name)}</div>
          </a>
          <div class="ev-note">${esc(e.note)}</div>
        </div>
      </div>`).join('');
    return `<div class="${dayCls}"><div class="fin-day-lbl">${lbl}</div>${evHtml}</div>`;
  }).join(''));
}

// ==================== 翻譯工具（Google Translate 免費端點）====================
async function translateZhTW(text) {
  if (!text) return text;
  // 若已含中文字則不翻譯
  if (/[\u4e00-\u9fff]/.test(text)) return text;
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`;
    const r = await fetch(url, { signal: AbortSignal.timeout(6000) });
    const d = await r.json();
    return (d[0] || []).map(s => s[0] || '').join('') || text;
  } catch (_) {
    // fallback via proxy
    try {
      const url2 = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=zh-TW&dt=t&q=${encodeURIComponent(text)}`;
      const r2 = await proxyFetch(url2);
      const d2 = JSON.parse(await r2.text());
      return (d2[0] || []).map(s => s[0] || '').join('') || text;
    } catch (__) { return text; }
  }
}

// ==================== REDDIT ====================
async function fetchReddit() {
  const el = id('redditContent');
  const subs = ['Stocks', 'investing', 'wallstreetbets'];
  const allPosts = [];

  const jobs = subs.map(async sub => {
    const apiUrl = `https://www.reddit.com/r/${sub}/hot.json?limit=8&raw_json=1`;
    let d = null;
    // Try direct fetch first; if CORS blocked, fall back to proxy
    try {
      const r = await fetch(apiUrl, { signal: AbortSignal.timeout(6000) });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      d = await r.json();
    } catch (_) {
      try {
        const r2 = await proxyFetch(apiUrl);
        d = JSON.parse(await r2.text());
      } catch (__) { return []; }
    }
    return (d?.data?.children || []).map(c => ({ ...c.data, _sub: sub }));
  });

  const res = await Promise.allSettled(jobs);
  res.forEach(r => { if (r.status === 'fulfilled') allPosts.push(...r.value); });

  if (!allPosts.length) {
    // 全部來源失敗：從 localStorage 回退
    try {
      const stored = JSON.parse(localStorage.getItem('smtm_reddit_db') || 'null');
      if (stored?.html) {
        setHtml(el, stored.html +
          '<p style="font-size:.65rem;color:var(--text3);text-align:center;margin-top:.4rem">（資料庫快取 · ' + fmtTs(stored.ts) + '）</p>');
        return;
      }
    } catch (_) {}
    setHtml(el, `<div class="err"><i class="fa-solid fa-triangle-exclamation"></i> 載入失敗<br>
      <a href="https://www.reddit.com/r/stocks/" target="_blank">前往 Reddit/stocks</a></div>`);
    return;
  }

  const top = allPosts
    .filter(p => !p.stickied && p.title)
    .sort((a, b) => b.ups - a.ups)
    .slice(0, 5);

  if (!top.length) {
    // 載入失敗：從 localStorage 回退
    try {
      const stored = JSON.parse(localStorage.getItem('smtm_reddit_db') || 'null');
      if (stored?.html) {
        setHtml(el, stored.html +
          '<p style="font-size:.65rem;color:var(--text3);text-align:center;margin-top:.4rem">（資料庫快取 · ' + fmtTs(stored.ts) + '）</p>');
        return;
      }
    } catch (_) {}
    setHtml(el, `<div class="err"><i class="fa-solid fa-triangle-exclamation"></i> 載入失敗<br>
      <a href="https://www.reddit.com/r/stocks/" target="_blank">前往 Reddit/stocks</a></div>`);
    return;
  }

  // 並行翻譯所有標題為繁體中文
  const translated = await Promise.allSettled(top.map(p => translateZhTW(p.title)));

  const html = top.map((p, i) => {
    const zhTitle = translated[i]?.status === 'fulfilled' ? translated[i].value : p.title;
    return `
    <div class="reddit-item">
      <a href="https://reddit.com${p.permalink}" target="_blank" rel="noopener">
        <div class="reddit-title">${esc(zhTitle)}</div>
        ${zhTitle !== p.title ? `<div style="font-size:.62rem;color:var(--text3);margin-top:.15rem">${esc(p.title)}</div>` : ''}
      </a>
      <div class="reddit-meta">
        <span class="r-ups"><i class="fa-solid fa-arrow-up"></i> ${fmtK(p.ups)}</span>
        <span class="r-cmt"><i class="fa-solid fa-comment"></i> ${fmtK(p.num_comments)}</span>
        <span class="tag tag-reddit">r/${p._sub}</span>
        <span class="ntime">${ago(p.created_utc * 1000)}</span>
      </div>
    </div>`;
  }).join('');

  // 成功時存入 localStorage 資料庫
  try { localStorage.setItem('smtm_reddit_db', JSON.stringify({ html, ts: Date.now() })); } catch (_) {}
  setHtml(el, html);
}

// ==================== PTT (HTML scraping) ====================
// rss.ptt.cc 已停止服務（404），改爬 PTT Stock 板 HTML index
// 快取 5 分鐘，避免頻繁呼叫被限速
const _pttCache = { ts: 0, html: '' };
const PTT_TTL   = 5 * 60 * 1000;

// proxyFetch 的 isGood 會過濾 HTML（<!DOCTYPE / <html），
// 故使用獨立的 helper 直接取得 HTML 內容
async function _fetchPttHtml() {
  const pttUrl = 'https://www.ptt.cc/bbs/Stock/index.html';
  const hasEnt = t => typeof t === 'string' && t.includes('r-ent');

  // Promise.any：三個 proxy 並行，最快有效結果勝出
  return Promise.any([
    // allorigins /get 回傳 JSON 包裝，response 不以 <html 開頭
    fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(pttUrl)}`,
          { signal: AbortSignal.timeout(12000) })
      .then(r => r.json())
      .then(d => { if (hasEnt(d.contents)) return d.contents; throw new Error('no r-ent'); }),
    // cors.lol 回傳原始 HTML
    fetch(`https://api.cors.lol/?url=${encodeURIComponent(pttUrl)}`,
          { signal: AbortSignal.timeout(12000) })
      .then(r => r.text())
      .then(t => { if (hasEnt(t)) return t; throw new Error('no r-ent'); }),
    // codetabs 回傳原始 HTML
    fetch(`https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(pttUrl)}`,
          { signal: AbortSignal.timeout(12000) })
      .then(r => r.text())
      .then(t => { if (hasEnt(t)) return t; throw new Error('no r-ent'); }),
  ]);
}

async function fetchPTT() {
  const el = id('pttContent');

  // 有效快取直接使用
  if (_pttCache.html && Date.now() - _pttCache.ts < PTT_TTL) {
    setHtml(el, _pttCache.html);
    return;
  }

  try {
    const htmlText = await _fetchPttHtml();
    const doc  = new DOMParser().parseFromString(htmlText, 'text/html');
    const ents = Array.from(doc.querySelectorAll('div.r-ent'));
    if (!ents.length) throw new Error('No .r-ent found');

    // PTT index 由舊到新排列，reverse 後取最新的前 5 篇
    const posts = ents.reverse().slice(0, 5).map(ent => {
      const titleEl = ent.querySelector('div.title a');
      if (!titleEl) return null; // 已刪除貼文
      const href   = titleEl.getAttribute('href') || '';
      const url    = href ? `https://www.ptt.cc${href}` : 'https://www.ptt.cc/bbs/Stock/';
      const title  = titleEl.textContent?.trim() || '';
      const author = ent.querySelector('div.author')?.textContent?.trim() || '';
      const date   = ent.querySelector('div.date')?.textContent?.trim() || '';
      const nrecEl = ent.querySelector('div.nrec span');
      const nrec   = nrecEl?.textContent?.trim() || '';
      return { title, url, author, date, nrec };
    }).filter(Boolean);

    if (!posts.length) throw new Error('No valid posts');

    const html = posts.map(p => `
      <div class="ptt-item">
        <a href="${p.url}" target="_blank" rel="noopener">
          <div class="ptt-title">${esc(p.title)}</div>
        </a>
        <div class="ptt-meta">
          <span class="ptt-author"><i class="fa-regular fa-user"></i> ${esc(p.author)}</span>
          ${p.nrec ? `<span class="ptt-push" style="color:var(--up);margin-left:.4rem">${esc(p.nrec)}</span>` : ''}
          <span class="ntime">${esc(p.date)}</span>
        </div>
      </div>`).join('');

    _pttCache.html = html;
    _pttCache.ts   = Date.now();
    // 成功時存入 localStorage 資料庫
    try { localStorage.setItem('smtm_ptt_db', JSON.stringify({ html, ts: Date.now() })); } catch (_) {}
    setHtml(el, html);

  } catch (e) {
    console.warn('[PTT]', e.message);
    if (_pttCache.html) {
      setHtml(el, _pttCache.html +
        '<p style="font-size:.65rem;color:var(--text3);text-align:center;margin-top:.4rem">（快取資料）</p>');
    } else {
      // 記憶體快取也無：嘗試 localStorage 資料庫
      try {
        const stored = JSON.parse(localStorage.getItem('smtm_ptt_db') || 'null');
        if (stored?.html) {
          setHtml(el, stored.html +
            '<p style="font-size:.65rem;color:var(--text3);text-align:center;margin-top:.4rem">（資料庫快取 · ' + fmtTs(stored.ts) + '）</p>');
          return;
        }
      } catch (_) {}
      setHtml(el, `<div class="err">
        <i class="fa-solid fa-triangle-exclamation"></i> PTT 載入失敗<br>
        <a href="https://www.ptt.cc/bbs/Stock/" target="_blank" rel="noopener">前往 PTT Stock 板</a>
      </div>`);
    }
  }
}

// ==================== RSS HELPER ====================
// 用 allorigins GET（JSON wrapper）取 RSS，再 regex 解析；
// allorigins/get 回傳 JSON 物件，不觸發 isGood HTML 過濾
function _parseRssItems(xmlText) {
  const items = [];
  const re = /<item[\s>]([\s\S]*?)<\/item>/g;
  let m;
  while ((m = re.exec(xmlText)) !== null) {
    const blk   = m[1];
    const title = (blk.match(/<title><!\[CDATA\[([\s\S]*?)\]\]>/) ||
                   blk.match(/<title>([\s\S]*?)<\/title>/))?.[1]?.trim() || '';
    const link  = (blk.match(/<link>([\s\S]*?)<\/link>/) ||
                   blk.match(/<guid[^>]*>([\s\S]*?)<\/guid>/))?.[1]?.trim() || '';
    const pub   = blk.match(/<pubDate>([\s\S]*?)<\/pubDate>/)?.[1]?.trim() || '';
    const desc  = (blk.match(/<description><!\[CDATA\[([\s\S]*?)\]\]>/) ||
                   blk.match(/<description>([\s\S]*?)<\/description>/))?.[1]?.trim() || '';
    if (title && link) items.push({ title, link, ts: pub ? new Date(pub).getTime() : 0, description: desc });
  }
  return items;
}

async function _fetchRssFeed(url) {
  // ① allorigins GET JSON wrapper（繞過 isGood HTML 過濾）
  try {
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
      { signal: AbortSignal.timeout(10000) });
    if (r.ok) {
      const d = await r.json();
      if (d.contents?.includes('<item>')) return _parseRssItems(d.contents);
    }
  } catch (_) {}
  // ② proxyFetch（RSS 是 XML，不含 <!DOCTYPE html，可通過 isGood）
  try {
    const r = await proxyFetch(url);
    const t = await r.text();
    if (t.includes('<item>')) return _parseRssItems(t);
  } catch (_) {}
  // ③ 直連（CORS 可能阻擋，視瀏覽器）
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(8000) });
    const t = await r.text();
    if (t.includes('<item>')) return _parseRssItems(t);
  } catch (_) {}
  return [];
}

// ==================== FINANCE NEWS (UDN RSS 主；Yahoo Finance 備援) ====================
const _finCache = { ts: 0, html: '' };
const FIN_TTL   = 5 * 60 * 1000;

async function fetchFinanceNews() {
  const el = id('finContent');

  if (_finCache.html && Date.now() - _finCache.ts < FIN_TTL) {
    setHtml(el, _finCache.html);
    return;
  }

  // ① 立即先顯示 localStorage 快取
  let hasCached = false;
  try {
    const stored = JSON.parse(localStorage.getItem('smtm_fin_news_db') || 'null');
    if (stored?.html) {
      setHtml(el, stored.html +
        '<p style="font-size:.65rem;color:var(--text3);text-align:center;margin-top:.4rem">（資料庫快取 · ' + fmtTs(stored.ts) + '）</p>');
      hasCached = true;
    }
  } catch (_) {}

  // ② 主接口：UDN 財經 RSS
  let allItems = await _fetchRssFeed(APIS.udn_fin.pri);

  // ③ 備援接口：UDN 科技 RSS（主接口不足 5 筆時補充）
  if (allItems.length < 5) {
    const bak = await _fetchRssFeed(APIS.udn_fin.bak);
    allItems.push(...bak);
  }

  // ④ 最終備援：Yahoo Finance Search（兩個 RSS 都失敗時）
  if (!allItems.length) {
    const queries = ['台股', '台積電', '財經'];
    const res = await Promise.allSettled(queries.map(q => _yfNewsSearch(q, 5)));
    res.forEach(r => {
      if (r.status === 'fulfilled') allItems.push(...r.value.map(n => ({ ...n, ts: n._ts || 0 })));
    });
  }

  if (!allItems.length) {
    if (!hasCached) {
      setHtml(el, '<div class="err"><i class="fa-solid fa-triangle-exclamation"></i> 財經新聞載入失敗<br><small>請稍後重試</small></div>');
    }
    return;
  }

  const seen = new Set();
  const top = allItems
    .filter(n => { if (!n.title || seen.has(n.title)) return false; seen.add(n.title); return true; })
    .sort((a, b) => (b.ts || 0) - (a.ts || 0))
    .slice(0, 5);

  const html = top.map((n, i) => {
    const rankCls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
    const pub = n.publisher || '經濟日報';
    const ts  = n.ts || 0;
    return `
      <div class="news-item">
        <div style="display:flex;align-items:flex-start;gap:.4rem">
          <span class="news-rank ${rankCls}">#${i+1}</span>
          <a href="${n.link}" target="_blank" rel="noopener" style="flex:1">
            <div class="news-title">${esc(n.title)}</div>
          </a>
        </div>
        <div class="news-meta" style="padding-left:1.7rem">
          <span class="tag tag-src">${esc(pub)}</span>
          <span class="ntime">${ts ? ago(ts) : ''}</span>
        </div>
      </div>`;
  }).join('');

  _finCache.html = html;
  _finCache.ts   = Date.now();
  try { localStorage.setItem('smtm_fin_news_db', JSON.stringify({ html, ts: Date.now() })); } catch (_) {}
  setHtml(el, html);
}

// ==================== REFRESH ====================
let _refreshing = false;
async function refreshAll() {
  if (_refreshing) return;   // 避免並發
  _refreshing = true;
  const btn = id('refreshBtn');
  if (btn) { btn.classList.add('spinning'); btn.disabled = true; }

  try {
    fetchFinCal(); // 非 proxy，不等

    // 第一波：景氣燈號 + 自選股（MIS 即時）— TWSE 系，先跑完釋放 proxy
    await Promise.allSettled([
      fetchTL(),
      fetchPortfolio().then(() => fetchPortNews()),
    ]);

    // 第二波：台灣市場（包含各指數 250ms 錯開）+ 社群（rate limit 已部分釋放）
    await Promise.allSettled([
      fetchMarkets(),
      fetchReddit(),
      fetchPTT(),
      fetchFinanceNews(),
    ]);
  } finally {
    _refreshing = false;
    if (btn) { btn.classList.remove('spinning'); btn.disabled = false; }
  }
}

// ==================== UTILS ====================
const id = s => document.getElementById(s);

// 設定 innerHTML 並同時移除 loading class（避免旋轉動畫卡住）
function setHtml(el, html) {
  if (!el) return;
  el.classList.remove('loading');
  el.innerHTML = html;
}

function fmtN(n, d = 2) {
  if (n == null || isNaN(n)) return '--';
  return n.toLocaleString('zh-TW', { minimumFractionDigits: d, maximumFractionDigits: d });
}

function fmtVol(v) {
  if (!v) return '--';
  if (v >= 1e8) return (v / 1e8).toFixed(2) + '億';
  if (v >= 1e4) return (v / 1e4).toFixed(1) + '萬';
  return v.toLocaleString();
}

function fmtK(n) {
  if (!n) return '0';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return '' + n;
}

function fmtTs(ms) {
  return new Date(ms).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
}

function ago(ms) {
  const s = Math.floor((Date.now() - ms) / 1000);
  if (s < 60) return '剛剛';
  if (s < 3600) return `${Math.floor(s/60)}分前`;
  if (s < 86400) return `${Math.floor(s/3600)}小時前`;
  if (s < 2592000) return `${Math.floor(s/86400)}天前`;
  return new Date(ms).toLocaleDateString('zh-TW');
}

function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}
